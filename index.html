<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bridge Submittal & RFI Tracker</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-analytics-compat.js"></script>
</head>
<body class="bg-slate-50 antialiased text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ============================================================================
    // INLINE SVG ICONS
    // ============================================================================
    const Icon = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const FileText = ({className}) => <Icon className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></Icon>;
    const FileQuestion = ({className}) => <Icon className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M10 10.3c.2-.4.5-.8.9-1a2.1 2.1 0 0 1 2.6.4c.3.4.5.8.5 1.3 0 1.3-2 2-2 2"/><circle cx="12" cy="17" r="1"/></Icon>;
    const Layers = ({className}) => <Icon className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></Icon>;
    const Plus = ({className}) => <Icon className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Search = ({className}) => <Icon className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
    const Filter = ({className}) => <Icon className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></Icon>;
    const ArrowLeft = ({className}) => <Icon className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;
    const Download = ({className}) => <Icon className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const UploadCloud = ({className}) => <Icon className={className}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></Icon>;
    const CheckCircle = ({className}) => <Icon className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
    const Clock = ({className}) => <Icon className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
    const AlertCircle = ({className}) => <Icon className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
    const FilePlus = ({className}) => <Icon className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></Icon>;
    const UsersIcon = ({className}) => <Icon className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
    const Edit2 = ({className}) => <Icon className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Icon>;
    const MessageSquare = ({className}) => <Icon className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>;
    const Send = ({className}) => <Icon className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></Icon>;
    const CornerDownRight = ({className}) => <Icon className={className}><polyline points="15 10 20 15 15 20"/><path d="M4 4v7a4 4 0 0 0 4 4h12"/></Icon>;
    const Tag = ({className}) => <Icon className={className}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></Icon>;
    const BarChart2 = ({className}) => <Icon className={className}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></Icon>;
    const X = ({className}) => <Icon className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const LinkIcon = ({className}) => <Icon className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></Icon>;
    const LogOut = ({className}) => <Icon className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;
    const Briefcase = ({className}) => <Icon className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></Icon>;
    const Trash2 = ({className}) => <Icon className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const UserPlus = ({className}) => <Icon className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></Icon>;

    // ============================================================================
    // FIREBASE INITIALIZATION 
    // ============================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyCrWXPOH_Uu3MKp5OInkqbypVB-NOU1Moc",
      authDomain: "submittal-log.firebaseapp.com",
      projectId: "submittal-log",
      storageBucket: "submittal-log.firebasestorage.app",
      messagingSenderId: "776483227689",
      appId: "1:776483227689:web:380b3c45ec975fd7223438",
      measurementId: "G-GVC1TMK90M"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    if (typeof window !== 'undefined' && firebase.analytics) {
      firebase.analytics();
    }

    // ============================================================================
    // CONSTANTS
    // ============================================================================
    const INTERNAL_STATUSES = ['Unassigned', 'Assigned', 'In Review', 'Ready for PM Approval', 'Sent Out'];
    const STATUSES = {
      submittals: ['Pending', 'Approved', 'Approved as Noted', 'Revise & Resubmit', 'Rejected', 'Information Only'],
      rfis: ['Pending', 'Answered', 'Clarification Requested', 'Closed']
    };

    // ============================================================================
    // MAIN APPLICATION COMPONENT
    // ============================================================================
    function App() {
      // Auth State
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [authMode, setAuthMode] = useState('login'); 
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');

      // Core Routing & Context State
      const [activeModule, setActiveModule] = useState('submittals'); 
      const [currentView, setCurrentView] = useState('dashboard'); // 'dashboard', 'intake', 'detail', 'analytics', 'projects', 'team'
      const [activeRecordItem, setActiveRecordItem] = useState(null);
      
      // Data State
      const [activeRecords, setActiveRecords] = useState([]);
      const [projects, setProjects] = useState([]);
      const [teamMembers, setTeamMembers] = useState([]); // Explicit user-managed registry
      
      const [loadingData, setLoadingData] = useState(true);
      const [isUploading, setIsUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);

      const [searchQuery, setSearchQuery] = useState('');
      const [dashboardTab, setDashboardTab] = useState('my-queue'); 

      // Edit & Comment States
      const [isEditing, setIsEditing] = useState(false);
      const [editFormData, setEditFormData] = useState({});
      const [newComment, setNewComment] = useState('');
      const [quickCommentModal, setQuickCommentModal] = useState(null); 
      const [quickCommentText, setQuickCommentText] = useState('');

      // Project Management State
      const [projForm, setProjForm] = useState({ id: '', name: '', client: '' });
      const [isEditingProj, setIsEditingProj] = useState(false);

      // Team Management State
      const [teamForm, setTeamForm] = useState({ id: '', name: '', email: '', role: 'Structural Engineer' });
      const [isEditingTeam, setIsEditingTeam] = useState(false);

      // Intake Form State
      const [intakeProject, setIntakeProject] = useState('');
      const [intakeType, setIntakeType] = useState('new'); 
      const [intakeBaseId, setIntakeBaseId] = useState('');
      const [intakeTitle, setIntakeTitle] = useState('');
      const [intakeSubtitle, setIntakeSubtitle] = useState('');
      const [intakeContractor, setIntakeContractor] = useState('');
      const [intakeRevision, setIntakeRevision] = useState(0);
      const [intakeSlaDays, setIntakeSlaDays] = useState(14);
      const [intakeComponents, setIntakeComponents] = useState('');
      const [intakeDisciplines, setIntakeDisciplines] = useState('');
      const [intakeRelatedDocs, setIntakeRelatedDocs] = useState(''); 
      const [intakeFile, setIntakeFile] = useState(null);

      // Redline Upload State
      const [outgoingFile, setOutgoingFile] = useState(null);
      const [toast, setToast] = useState(null);

      // --------------------------------------------------------------------------
      // DYNAMIC IDENTITY BINDING
      // --------------------------------------------------------------------------
      const activeUserRole = user ? { id: user.uid, name: user.email } : { id: 'guest', name: 'Guest' };
      
      // Robust fallback array for the datalist to guarantee options load correctly
      const allUserOptions = React.useMemo(() => {
        const options = new Set();
        options.add('Unassigned');
        
        // Always include the active authenticated user
        if (user && user.email) options.add(user.email);
        
        // Add dynamically fetched users from the Firestore registry
        teamMembers.forEach(member => options.add(member.name));
        
        return Array.from(options);
      }, [user, teamMembers]);

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      // Reset states on view change
      useEffect(() => {
        if (currentView === 'intake') {
          setIntakeProject('');
          setIntakeType('new');
          setIntakeBaseId('');
          setIntakeTitle('');
          setIntakeSubtitle('');
          setIntakeContractor('');
          setIntakeRevision(0);
          setIntakeSlaDays(14);
          setIntakeComponents('');
          setIntakeDisciplines('');
          setIntakeRelatedDocs('');
          setIntakeFile(null);
          setUploadProgress(0);
        }
        if (currentView !== 'detail') {
          setIsEditing(false);
          setNewComment('');
          setOutgoingFile(null);
          setUploadProgress(0);
        }
        if (currentView !== 'projects') {
          setProjForm({ id: '', name: '', client: '' });
          setIsEditingProj(false);
        }
        if (currentView !== 'team') {
          setTeamForm({ id: '', name: '', email: '', role: 'Structural Engineer' });
          setIsEditingTeam(false);
        }
      }, [currentView, activeModule]);

      useEffect(() => {
        if (intakeType === 'revision' && intakeBaseId) {
          const baseRec = activeRecords.find(s => s.id === intakeBaseId);
          if (baseRec) {
            setIntakeTitle(baseRec.title);
            setIntakeSubtitle(baseRec.subtitle || '');
            setIntakeContractor(baseRec.contractor);
            setIntakeRevision(Number(baseRec.revision) + 1);
            setIntakeSlaDays(baseRec.slaDays || 14);
            setIntakeRelatedDocs(baseRec.relatedDocs || '');
          }
        }
      }, [intakeType, intakeBaseId, activeRecords]);

      // --------------------------------------------------------------------------
      // AUTHENTICATION HANDLERS
      // --------------------------------------------------------------------------
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (currentUser) => {
          setUser(currentUser);
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const handleAuthSubmit = async (e) => {
        e.preventDefault();
        setAuthLoading(true);
        try {
          if (authMode === 'login') {
            await auth.signInWithEmailAndPassword(authEmail, authPassword);
            showToast('Logged in successfully');
          } else {
            await auth.createUserWithEmailAndPassword(authEmail, authPassword);
            showToast('Account created successfully');
          }
        } catch (error) {
          console.error("Auth error:", error);
          showToast(error.message, 'error');
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogout = async () => {
        await auth.signOut();
        showToast('Logged out');
      };

      // --------------------------------------------------------------------------
      // FIRESTORE SYNC (RECORDS, PROJECTS, TEAM)
      // --------------------------------------------------------------------------
      useEffect(() => {
        if (!user) return; 
        setLoadingData(true);
        
        // Sync Active Module Records
        const recordsUnsubscribe = db.collection(activeModule).onSnapshot(
          (snapshot) => {
            const fetchedData = snapshot.docs.map(doc => ({
              id: doc.id,
              ...doc.data()
            }));
            fetchedData.sort((a, b) => new Date(b.dateReceived) - new Date(a.dateReceived));
            setActiveRecords(fetchedData);
            
            if (activeRecordItem) {
              const updatedActive = fetchedData.find(s => s.id === activeRecordItem.id);
              if (updatedActive) setActiveRecordItem(updatedActive);
            }
            setLoadingData(false);
          },
          (error) => {
            console.error("Firestore sync error:", error);
            setLoadingData(false);
            if(error.code === 'permission-denied'){
               showToast('Permission denied. Check Firestore security rules.', 'error');
            }
          }
        );

        // Sync Projects
        const projectsUnsubscribe = db.collection('projects').onSnapshot(
          (snapshot) => {
             const fetchedProjects = snapshot.docs.map(doc => ({
               id: doc.id,
               ...doc.data()
             }));
             fetchedProjects.sort((a, b) => a.name.localeCompare(b.name));
             setProjects(fetchedProjects);
          },
          (error) => console.error("Project sync error:", error)
        );

        // Sync Team Members (Explicitly managed registry)
        const teamUnsubscribe = db.collection('teamMembers').onSnapshot(
          (snapshot) => {
             const fetchedTeam = snapshot.docs.map(doc => ({
               id: doc.id,
               ...doc.data()
             }));
             fetchedTeam.sort((a, b) => a.name.localeCompare(b.name));
             setTeamMembers(fetchedTeam);
          },
          (error) => console.error("Team sync error:", error)
        );

        return () => {
          recordsUnsubscribe();
          projectsUnsubscribe();
          teamUnsubscribe();
        };
      }, [user, activeModule, activeRecordItem?.id]);

      // --------------------------------------------------------------------------
      // PROJECT MANAGEMENT HANDLERS
      // --------------------------------------------------------------------------
      const handleProjectSubmit = async (e) => {
        e.preventDefault();
        try {
            if (isEditingProj) {
                await db.collection('projects').doc(projForm.id).update({
                    name: projForm.name,
                    client: projForm.client
                });
                showToast('Project updated successfully.');
            } else {
                const projId = `PRJ-${Date.now().toString().slice(-4)}`;
                await db.collection('projects').doc(projId).set({
                    name: projForm.name,
                    client: projForm.client,
                    createdAt: new Date().toISOString()
                });
                showToast('Project added successfully.');
            }
            setProjForm({ id: '', name: '', client: '' });
            setIsEditingProj(false);
        } catch (error) {
            console.error("Project save error:", error);
            showToast('Error saving project.', 'error');
        }
      };

      const handleDeleteProject = async (id) => {
         try {
           await db.collection('projects').doc(id).delete();
           showToast('Project removed successfully.');
         } catch(err) {
           console.error(err);
           showToast('Failed to remove project.', 'error');
         }
      };

      // --------------------------------------------------------------------------
      // TEAM MANAGEMENT HANDLERS
      // --------------------------------------------------------------------------
      const handleTeamSubmit = async (e) => {
        e.preventDefault();
        try {
            if (isEditingTeam) {
                await db.collection('teamMembers').doc(teamForm.id).update({
                    name: teamForm.name,
                    email: teamForm.email,
                    role: teamForm.role
                });
                showToast('Team member updated successfully.');
            } else {
                const teamId = `USR-${Date.now().toString().slice(-4)}`;
                await db.collection('teamMembers').doc(teamId).set({
                    name: teamForm.name,
                    email: teamForm.email,
                    role: teamForm.role,
                    createdAt: new Date().toISOString()
                });
                showToast('Team member added successfully.');
            }
            setTeamForm({ id: '', name: '', email: '', role: 'Structural Engineer' });
            setIsEditingTeam(false);
        } catch (error) {
            console.error("Team save error:", error);
            showToast('Error saving team member.', 'error');
        }
      };

      const handleDeleteTeamMember = async (id) => {
         try {
           await db.collection('teamMembers').doc(id).delete();
           showToast('Team member removed successfully.');
         } catch(err) {
           console.error(err);
           showToast('Failed to remove team member.', 'error');
         }
      };

      // --------------------------------------------------------------------------
      // ADVANCED FILE UPLOAD HELPER
      // --------------------------------------------------------------------------
      const uploadFileWithProgress = (file, filePath) => {
        return new Promise((resolve, reject) => {
          const storageRef = storage.ref().child(filePath);
          const uploadTask = storageRef.put(file);

          uploadTask.on('state_changed',
            (snapshot) => {
              const progress = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
              setUploadProgress(progress);
            },
            (error) => {
              console.error("Storage Error Detail:", error);
              if (error.code === 'storage/unauthorized') {
                showToast("Upload blocked: Verify Storage Security Rules in Console.", "error");
              }
              reject(error);
            },
            async () => {
              try {
                const url = await uploadTask.snapshot.ref.getDownloadURL();
                resolve(url);
              } catch(e) {
                reject(e);
              }
            }
          );
        });
      };

      // --------------------------------------------------------------------------
      // DATA & FILE HANDLERS (SUBMITTALS/RFIS)
      // --------------------------------------------------------------------------
      const handleIntakeSubmit = async (e) => {
        e.preventDefault();
        if (!user) return;

        setIsUploading(true);
        setUploadProgress(0);
        
        const prefix = activeModule === 'submittals' ? 'SUB' : 'RFI';
        const recordId = `${prefix}-${Date.now().toString().slice(-6)}`;
        const slaDays = Number(intakeSlaDays) || 14;
        
        let fileDownloadUrl = null;

        try {
          if (intakeFile) {
             const fileExt = intakeFile.name.split('.').pop();
             const filePath = `projects/${intakeProject}/${activeModule}/${recordId}/Incoming_Rev${intakeRevision}.${fileExt}`;
             
             showToast(`Initiating connection...`, 'success');
             fileDownloadUrl = await uploadFileWithProgress(intakeFile, filePath);
          }

          const tags = {
            components: intakeComponents.split(',').map(s => s.trim()).filter(s => s),
            disciplines: intakeDisciplines.split(',').map(s => s.trim()).filter(s => s)
          };
          
          const rawAssignee = e.target.elements.assignedTo.value.trim();

          const newRecord = {
            projectId: intakeProject,
            projectName: projects.find(p => p.id === intakeProject)?.name || 'Unknown Project',
            title: intakeTitle,
            subtitle: intakeSubtitle || '',
            contractor: intakeContractor,
            revision: Number(intakeRevision),
            baseSubmittalId: intakeBaseId || null, 
            dateReceived: new Date().toISOString(),
            slaDays: slaDays,
            dueDate: new Date(Date.now() + slaDays * 24 * 60 * 60 * 1000).toISOString(),
            assignedTo: rawAssignee || 'Unassigned',
            internalStatus: (!rawAssignee || rawAssignee === 'Unassigned') ? 'Unassigned' : 'Assigned',
            externalStatus: 'Pending',
            incomingPdfRef: fileDownloadUrl, 
            incomingFileName: intakeFile ? intakeFile.name : null,
            outgoingPdfRef: null,
            outgoingFileName: null,
            relatedDocs: intakeRelatedDocs.trim(),
            comments: [], 
            tags: tags,
            loggedBy: activeUserRole.name,
            loggedById: activeUserRole.id,
            qcReviewer: '',
            history: [{
              timestamp: new Date().toISOString(),
              action: `Ingested ${activeModule.slice(0, -1)}${intakeFile ? ' with attachment' : ''}`,
              user: activeUserRole.name
            }]
          };

          await db.collection(activeModule).doc(recordId).set(newRecord);
          showToast(`${activeModule.slice(0, -1)} logged successfully!`);
          setCurrentView('dashboard');
        } catch (error) {
          console.error("Error logging record:", error);
          showToast('Error saving record or file upload failed.', 'error');
        } finally {
          setIsUploading(false);
          setUploadProgress(0);
        }
      };

      const handleUploadOutgoingFile = async () => {
        if (!outgoingFile || !activeRecordItem || !user) return;
        
        setIsUploading(true);
        setUploadProgress(0);
        try {
           const fileExt = outgoingFile.name.split('.').pop();
           const filePath = `projects/${activeRecordItem.projectId}/${activeModule}/${activeRecordItem.id}/Markups_Rev${activeRecordItem.revision}.${fileExt}`;
           
           showToast(`Initiating connection...`, 'success');
           const fileDownloadUrl = await uploadFileWithProgress(outgoingFile, filePath);

           await db.collection(activeModule).doc(activeRecordItem.id).update({
             outgoingPdfRef: fileDownloadUrl,
             outgoingFileName: outgoingFile.name,
             history: [
               ...(activeRecordItem.history || []), 
               {
                 timestamp: new Date().toISOString(),
                 action: `Uploaded Redlined Response (${outgoingFile.name})`,
                 user: activeUserRole.name
               }
             ]
           });
           showToast('Markups uploaded successfully!');
           setOutgoingFile(null);
        } catch (error) {
           console.error("Error uploading markups:", error);
           showToast("Failed to upload markups.", "error");
        } finally {
           setIsUploading(false);
           setUploadProgress(0);
        }
      };

      const handleUpdateStatus = async (recordId, updateData) => {
        try {
          await db.collection(activeModule).doc(recordId).update({
            ...updateData,
            history: [

        const subLabel = activeModule === 'submittals' ? 'Spec Reference' : 'Proposed Solution';

        const headers = [
          `${moduleLabel} ID`, revLabel, "Title", subLabel, "Project", 
          "Contractor", "Logged By", "Internal Status", "External Status", "Assigned To", "QC Reviewer", 
          "Date Received", "SLA Days", "Due Date", "Component Tags", "Discipline Tags", "Related Plan Sheets"
        ];
        
        const rows = treeRecords.map(sub => [
          sub.id,
          sub.revision,
          `"${sub.title.replace(/"/g, '""')}"`,
          `"${(sub.subtitle || '').replace(/"/g, '""')}"`,
          `"${sub.projectName.replace(/"/g, '""')}"`,
          `"${sub.contractor.replace(/"/g, '""')}"`,
          `"${(sub.loggedBy || 'System Legacy').replace(/"/g, '""')}"`,
          sub.internalStatus,

          `"${(sub.assignedTo || 'Unassigned').replace(/"/g, '""')}"`,

          new Date(sub.dueDate).toLocaleDateString(),

          `"${(sub.tags?.disciplines || []).join(', ')}"`,
          `"${(sub.relatedDocs || '').replace(/"/g, '""')}"`
        ]);

        const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `${moduleLabel}_Log_Export_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('Export triggered successfully.');

          let maxDate = new Date(node.dateReceived).getTime();
          node.children.forEach(child => {
            const childMax = getMaxDate(child);
            if (childMax > maxDate) maxDate = childMax;
          });
          return maxDate;
        };

        roots.sort((a, b) => getMaxDate(b) - getMaxDate(a));

        const flatTree = [];

            isVirtual: true,
            id: `GROUP-${root.id}`,
            title: root.title,
            projectName: root.projectName,
            contractor: root.contractor,
            itemCount: allItems.length,
            indentLevel: 0
          };
          
          flatTree.push(virtualGroup);
          
          allItems.forEach(item => {
            item.indentLevel = 1;
            flatTree.push(item);
          });
        });
        return flatTree;

                  )}
                </div>
              </div>
            )}

            {/* VIEW: DETAIL & REVIEW */}
            {currentView === 'detail' && activeRecordItem && (
              <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                {/* LEFT COLUMN: Properties, Files, Comments */}
                <div className="lg:col-span-1 space-y-6">
                  <div className="flex items-center justify-between">
                    <button 
                      onClick={() => {
                        setActiveRecordItem(null);
                        setCurrentView('dashboard');
                      }}
                      className="flex items-center gap-2 text-sm text-slate-500 hover:text-slate-800 transition-colors"
                    >
                      <ArrowLeft className="w-4 h-4" /> Back to List
                    </button>
                    <button 
                      onClick={() => handleDeleteRecord(activeRecordItem.id)}
                      className="flex items-center gap-1.5 text-sm font-medium text-red-600 hover:text-red-800 transition-colors bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-md"
                      title={`Permanently Delete ${termModule}`}
                    >
                      <Trash2 className="w-4 h-4" /> Delete
                    </button>
                  </div>
                  
                  {/* Properties Card */}
                  <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-6 relative">
                    {!isEditing ? (
                      <>
                        <div className="flex justify-between items-start mb-4 border-b border-slate-100 pb-2">
                          <h3 className="font-bold text-slate-900">Properties</h3>
                          <button 
                            onClick={() => {
                              setEditFormData({
                                title: activeRecordItem.title,
                                subtitle: activeRecordItem.subtitle || '',
                                contractor: activeRecordItem.contractor,
                                revision: activeRecordItem.revision,
                                slaDays: activeRecordItem.slaDays,
                                relatedDocs: activeRecordItem.relatedDocs || ''
                              });
                              setIsEditing(true);
                            }}
                            className="text-slate-400 hover:text-blue-600 p-1 transition-colors"
                            title={`Edit ${termModule}`}
                          >
                            <Edit2 className="w-4 h-4" />
                          </button>
                        </div>
                        <dl className="space-y-4 text-sm">
                          <div>
                            <dt className="text-slate-500 text-xs uppercase tracking-wider mb-1">{termModule} ID</dt>
                            <dd className="font-medium text-slate-900">{activeRecordItem.id} ({termRev} {activeRecordItem.revision})</dd>
                          </div>
                          <div>
                            <dt className="text-slate-500 text-xs uppercase tracking-wider mb-1">Logged By</dt>
                            <dd className="font-medium text-slate-900">{activeRecordItem.loggedBy || 'System Legacy'}</dd>
                          </div>
                          {activeRecordItem.subtitle && (
                            <div>
                              <dt className="text-slate-500 text-xs uppercase tracking-wider mb-1">{termSubtitle}</dt>
                              <dd className="font-medium text-slate-900">{activeRecordItem.subtitle}</dd>
                            </div>
                          )}
                          {activeRecordItem.relatedDocs && (
                            <div className="bg-blue-50/50 p-2 rounded-lg border border-blue-100">
                              <dt className="text-blue-600 text-[10px] uppercase font-bold tracking-wider mb-1 flex items-center gap-1"><LinkIcon className="w-3 h-3"/> Plan Sheets & Ref Docs</dt>
                              <dd className="font-semibold text-slate-900">{activeRecordItem.relatedDocs}</dd>
                            </div>
                          )}
                          <div>
                            <dt className="text-slate-500 text-xs uppercase tracking-wider mb-1">Project</dt>
                            <dd className="font-medium text-slate-900">{activeRecordItem.projectName}</dd>
                          </div>
                          <div>
                            <dt className="text-slate-500 text-xs uppercase tracking-wider mb-1">Contractor</dt>
                            <dd className="font-medium text-slate-900">{activeRecordItem.contractor}</dd>
                          </div>
                          <div className="grid grid-cols-2 gap-4">
                            <div>
                              <dt className="text-slate-500 text-xs uppercase tracking-wider mb-1">Date Received</dt>
                              <dd className="font-medium text-slate-900">{new Date(activeRecordItem.dateReceived).toLocaleDateString()}</dd>
                            </div>
                            <div>
                              <dt className="text-slate-500 text-xs uppercase tracking-wider mb-1">SLA</dt>
                              <dd className="font-medium text-slate-900">{activeRecordItem.slaDays} Days</dd>
                            </div>
                          </div>
                          <div>
                            <dt className="text-slate-500 text-xs uppercase tracking-wider mb-1">Calculated Due Date</dt>
                            <dd className="font-medium text-slate-900">{new Date(activeRecordItem.dueDate).toLocaleDateString()}</dd>
                          </div>
                        </dl>
                      </>
                    ) : (
                      <form onSubmit={handleEditSubmit} className="space-y-4">
                        <h3 className="font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">Edit Properties</h3>
                        
                        <div>
                          <label className="block text-xs font-medium text-slate-500 mb-1">Title</label>
                          <input type="text" required className="w-full border border-slate-300 rounded p-1.5 text-sm" value={editFormData.title} onChange={e => setEditFormData({...editFormData, title: e.target.value})} />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-slate-500 mb-1">{termSubtitle}</label>
                          <input type="text" className="w-full border border-slate-300 rounded p-1.5 text-sm" value={editFormData.subtitle} onChange={e => setEditFormData({...editFormData, subtitle: e.target.value})} />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-blue-600 mb-1 flex items-center gap-1"><LinkIcon className="w-3 h-3"/> Plan Sheets / Refs</label>
                          <input type="text" className="w-full border border-blue-300 bg-blue-50/50 rounded p-1.5 text-sm" value={editFormData.relatedDocs} onChange={e => setEditFormData({...editFormData, relatedDocs: e.target.value})} />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-slate-500 mb-1">Contractor</label>
                          <input type="text" required className="w-full border border-slate-300 rounded p-1.5 text-sm" value={editFormData.contractor} onChange={e => setEditFormData({...editFormData, contractor: e.target.value})} />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="block text-xs font-medium text-slate-500 mb-1">{termRev}</label>
                            <input type="number" required min="0" className="w-full border border-slate-300 rounded p-1.5 text-sm" value={editFormData.revision} onChange={e => setEditFormData({...editFormData, revision: e.target.value})} />
                          </div>
                          <div>
                            <label className="block text-xs font-medium text-slate-500 mb-1">SLA (Days)</label>
                            <input type="number" required min="1" className="w-full border border-slate-300 rounded p-1.5 text-sm" value={editFormData.slaDays} onChange={e => setEditFormData({...editFormData, slaDays: e.target.value})} />
                          </div>
                        </div>
                        
                        <div className="flex justify-end gap-2 pt-2">
                          <button type="button" onClick={() => setIsEditing(false)} className="px-3 py-1.5 border border-slate-300 rounded text-xs font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
                          <button type="submit" className="px-3 py-1.5 bg-blue-600 text-white rounded text-xs font-medium hover:bg-blue-700">Save Changes</button>
                        </div>
                      </form>
                    )}
                  </div>

                  {/* Cloud File Links */}
                  <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
                    <h3 className="font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">Cloud Files</h3>
                    <div className="space-y-3">
                      {activeRecordItem.incomingPdfRef ? (
                        <div className="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-slate-200">
                          <div className="flex items-center gap-2 overflow-hidden">
                            <FileText className="w-5 h-5 text-blue-500 flex-shrink-0" />
                            <div className="text-sm font-medium text-slate-700 truncate" title={activeRecordItem.incomingFileName}>
                              {activeRecordItem.incomingFileName || "Incoming Package"}
                            </div>
                          </div>
                          <a href={activeRecordItem.incomingPdfRef} target="_blank" rel="noreferrer" className="text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 p-1.5 rounded-md transition-colors">
                            <Download className="w-4 h-4"/>
                          </a>
                        </div>
                      ) : (
                         <p className="text-sm text-slate-500 italic">No incoming file uploaded.</p>
                      )}
                      
                      {activeRecordItem.outgoingPdfRef && (
                        <div className="flex items-center justify-between p-3 bg-green-50 rounded-lg border border-green-200">
                          <div className="flex items-center gap-2 overflow-hidden">
                            <CheckCircle className="w-5 h-5 text-green-500 flex-shrink-0" />
                            <div className="text-sm font-medium text-green-800 truncate" title={activeRecordItem.outgoingFileName}>
                              {activeRecordItem.outgoingFileName || "Marked Up Final"}
                            </div>
                          </div>
                          <a href={activeRecordItem.outgoingPdfRef} target="_blank" rel="noreferrer" className="text-green-700 hover:text-green-900 bg-green-100 hover:bg-green-200 p-1.5 rounded-md transition-colors">
                            <Download className="w-4 h-4"/>
                          </a>
                        </div>
                      )}
                    </div>
                  </div>
                  
                  {/* Comments Section */}
                  <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-6 flex flex-col h-96">
                    <div className="flex items-center gap-2 mb-4 border-b border-slate-100 pb-2">
                      <MessageSquare className="w-4 h-4 text-slate-500" />
                      <h3 className="font-bold text-slate-900">Discussion</h3>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto space-y-4 mb-4 pr-2">
                      {(!activeRecordItem.comments || activeRecordItem.comments.length === 0) ? (
                        <p className="text-sm text-slate-400 text-center italic mt-4">No comments yet. Start the discussion.</p>
                      ) : (
                        activeRecordItem.comments.map(comment => (
                          <div key={comment.id} className="bg-slate-50 rounded-lg p-3 border border-slate-100">
                            <div className="flex justify-between items-start mb-1">
                              <span className="font-medium text-xs text-slate-800">{comment.user}</span>
                              <span className="text-[10px] text-slate-400">{new Date(comment.timestamp).toLocaleDateString()} {new Date(comment.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <p className="text-sm text-slate-700 whitespace-pre-wrap">{comment.text}</p>
                          </div>
                        ))
                      )}
                    </div>
                    
                    <form onSubmit={handleAddComment} className="mt-auto relative">
                      <textarea 
                        className="w-full border border-slate-300 rounded-lg p-3 pr-12 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none"
                        rows="2"
                        placeholder="Add a comment or note..."
                        value={newComment}
                        onChange={(e) => setNewComment(e.target.value)}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            handleAddComment(e);
                          }
                        }}
                      ></textarea>
                      <button 
                        type="submit"
                        disabled={!newComment.trim()}
                        className="absolute right-2 bottom-3 p-1.5 text-blue-600 hover:bg-blue-50 rounded-md transition-colors disabled:opacity-50 disabled:hover:bg-transparent"
                      >
                        <Send className="w-4 h-4" />
                      </button>
                    </form>
                  </div>
                </div>

                {/* RIGHT COLUMN: Review Routing */}
                <div className="lg:col-span-2 space-y-6">
                  <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-8">
                    <div className="flex items-start justify-between mb-6">
                      <div>
                        <h2 className="text-2xl font-bold text-slate-900">{activeRecordItem.title}</h2>
                        <p className="text-slate-500 mt-1">Review interface and routing controls</p>
                      </div>
                      <div className={`px-3 py-1 rounded-full text-sm font-bold border
                          ${(activeRecordItem.externalStatus || '').includes('Pending') ? 'bg-amber-50 text-amber-700 border-amber-200' : 
                            (activeRecordItem.externalStatus || '').includes('Approved') || activeRecordItem.externalStatus === 'Answered' || activeRecordItem.externalStatus === 'Closed' ? 'bg-green-50 text-green-700 border-green-200' :
                            'bg-red-50 text-red-700 border-red-200'}
                        `}
                      >
                        Official: {activeRecordItem.externalStatus || 'Pending'}
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-8 border-t border-slate-100 pt-6">
                      
                      <div className="space-y-4">
                        <h4 className="font-semibold text-slate-800 text-sm flex items-center gap-2"><UsersIcon className="w-4 h-4"/> Internal Routing</h4>
                        <div>
                          <label className="block text-xs font-medium text-slate-500 mb-1">Assigned Engineer</label>
                          <input 
                            type="text" 
                            list="user-list"
                            className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-blue-500 outline-none"
                            placeholder="Select or type a name..."
                            defaultValue={activeRecordItem.assignedTo || ''}
                            onBlur={(e) => {
                              if (e.target.value !== activeRecordItem.assignedTo) {
                                handleUpdateStatus(activeRecordItem.id, { assignedTo: e.target.value || 'Unassigned' });
                              }
                            }}
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-slate-500 mb-1">QC Reviewer</label>
                          <input 
                            type="text" 
                            list="user-list"
                            className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-blue-500 outline-none"
                            placeholder="Select or type a reviewer name..."
                            defaultValue={activeRecordItem.qcReviewer || ''}
                            onBlur={(e) => {
                              if (e.target.value !== activeRecordItem.qcReviewer) {
                                handleUpdateStatus(activeRecordItem.id, { qcReviewer: e.target.value });
                              }
                            }}
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-slate-500 mb-1">Internal Status</label>
                          <select 
                            className="w-full border border-slate-300 rounded-md p-2 text-sm focus:ring-blue-500 outline-none"
                            value={activeRecordItem.internalStatus || 'Unassigned'}
                            onChange={(e) => handleUpdateStatus(activeRecordItem.id, { internalStatus: e.target.value })}
                          >
                            {INTERNAL_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                        </div>
                      </div>

                      <div className="space-y-4">
                        <h4 className="font-semibold text-slate-800 text-sm flex items-center gap-2"><CheckCircle className="w-4 h-4"/> Engineering Decision</h4>
                        <div>
                          <label className="block text-xs font-medium text-slate-500 mb-1">Official {termModule} Status</label>
                          <select 
                            className="w-full border border-amber-300 bg-amber-50 rounded-md p-2 text-sm focus:ring-amber-500 outline-none font-medium text-amber-900"
                            value={activeRecordItem.externalStatus || 'Pending'}
                            onChange={(e) => handleUpdateStatus(activeRecordItem.id, { externalStatus: e.target.value })}
                          >
                            {STATUSES[activeModule].map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                        </div>
                        
                        {/* Actual Markups File Upload */}
                        <div className="pt-2">
                           <label className="block text-xs font-medium text-slate-500 mb-1">Upload Redlined Response</label>
                           <div className="flex items-center gap-2">
                             <input 
                               type="file" 
                               accept="application/pdf"
                               onChange={(e) => setOutgoingFile(e.target.files[0])}
                               className="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                             />
                             <button 
                                onClick={handleUploadOutgoingFile}
                                disabled={!outgoingFile || isUploading}
                                className="px-3 py-1.5 bg-slate-800 text-white rounded text-xs font-medium hover:bg-slate-900 disabled:opacity-50"
                             >
                               {isUploading ? `Uploading (${uploadProgress}%)...` : 'Upload'}
                             </button>
                           </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* VIEW: ANALYTICS DASHBOARD */}
            {currentView === 'analytics' && (
              <div className="space-y-6">
                <div className="flex items-center gap-3 border-b border-slate-200 pb-4">
                  <div className="bg-slate-800 p-2 rounded-lg">
                    <BarChart2 className="w-6 h-6 text-white" />
                  </div>
                  <div>
                    <h2 className="text-2xl font-bold text-slate-900">Project Manager Analytics</h2>
                    <p className="text-sm text-slate-500">KPIs and Workload Tracking across active <span className="font-bold text-blue-600">{activeModule}</span>.</p>
                  </div>
                </div>

                {(() => {
                  const activeItems = activeRecords.filter(s => s.internalStatus !== 'Sent Out');
                  const overdueItems = activeItems.filter(s => {
                    const days = Math.floor((Date.now() - new Date(s.dateReceived).getTime()) / (1000 * 60 * 60 * 24));
                    return days > (s.slaDays || 14);
                  });
                  const totalDays = activeItems.reduce((acc, s) => acc + Math.floor((Date.now() - new Date(s.dateReceived).getTime()) / (1000 * 60 * 60 * 24)), 0);
                  const avgTurnaround = activeItems.length > 0 ? Math.round(totalDays / activeItems.length) : 0;
                  const percentOverdue = activeItems.length > 0 ? Math.round((overdueItems.length / activeItems.length) * 100) : 0;

                  // Dynamically group workload by assigned string
                  const workloadMap = {};
                  activeItems.forEach(s => {
                    const assignee = s.assignedTo || 'Unassigned';
                    workloadMap[assignee] = (workloadMap[assignee] || 0) + 1;
                  });
                  const workload = Object.keys(workloadMap).map(name => ({
                    name,
                    count: workloadMap[name]
                  })).sort((a, b) => b.count - a.count);

                  return (
                    <div className="space-y-8">
                      {/* KPI Cards */}
                      <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
                          <p className="text-sm font-medium text-slate-500 mb-1">Total Active {termModule}s</p>
                          <p className="text-3xl font-bold text-slate-900">{activeItems.length}</p>
                        </div>
                        <div className="bg-white border border-red-200 rounded-xl p-6 shadow-sm bg-red-50">
                          <p className="text-sm font-medium text-red-600 mb-1">Currently Overdue</p>
                          <p className="text-3xl font-bold text-red-700">{overdueItems.length}</p>
                        </div>
                        <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
                          <p className="text-sm font-medium text-slate-500 mb-1">Avg Active Aging (Days)</p>
                          <p className="text-3xl font-bold text-slate-900">{avgTurnaround}</p>
                        </div>
                        <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
                          <p className="text-sm font-medium text-slate-500 mb-1">% Exceeding SLA</p>
                          <p className="text-3xl font-bold text-slate-900">{percentOverdue}%</p>
                        </div>
                      </div>

                      {/* Workload Distribution */}
                      <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                        <div className="px-6 py-4 border-b border-slate-100 bg-slate-50">
                          <h3 className="font-bold text-slate-800">Engineer Workload Distribution ({activeModule})</h3>
                        </div>
                        <div className="p-6">
                          <div className="space-y-4">
                            {workload.length === 0 ? (
                              <p className="text-sm text-slate-500 italic">No active assignments to map.</p>
                            ) : (
                              workload.map(user => {
                                const maxCount = Math.max(...workload.map(w => w.count), 1);
                                const width = `${(user.count / maxCount) * 100}%`;
                                return (
                                  <div key={user.name}>
                                    <div className="flex justify-between text-sm mb-1">
                                      <span className="font-medium text-slate-700">{user.name}</span>
                                      <span className="font-bold text-slate-900">{user.count} items</span>
                                    </div>
                                    <div className="w-full bg-slate-100 rounded-full h-2.5">
                                      <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-500 ease-out" style={{ width }}></div>
                                    </div>
                                  </div>
                                );
                              })
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}
          </main>

          {/* Quick Comment Modal */}
          {quickCommentModal && (
            <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                  <h3 className="font-bold text-slate-900 flex items-center gap-2">
                    <MessageSquare className="w-4 h-4 text-blue-600" />
                    Quick Comment
                  </h3>
                  <button onClick={() => setQuickCommentModal(null)} className="text-slate-400 hover:text-slate-600">
                    <X className="w-5 h-5" />
                  </button>
                </div>
                <div className="p-6">
                  <div className="mb-4">
                    <p className="text-xs text-slate-500 uppercase tracking-wider mb-1">{termModule}</p>
                    <p className="font-medium text-slate-900">{quickCommentModal.title}</p>
                    <p className="text-xs text-slate-500">ID: {quickCommentModal.id} • {termRev} {quickCommentModal.revision}</p>
                  </div>
                  
                  <form onSubmit={handleQuickCommentSubmit}>
                    <label className="block text-sm font-medium text-slate-700 mb-2">Your Note</label>
                    <textarea 
                      autoFocus
                      className="w-full border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none"
                      rows="4"
                      placeholder="Type your comment here..."
                      value={quickCommentText}
                      onChange={(e) => setQuickCommentText(e.target.value)}
                    ></textarea>
                    
                    <div className="flex justify-end gap-3 mt-6">
                      <button 
                        type="button" 
                        onClick={() => setQuickCommentModal(null)} 
                        className="px-4 py-2 border border-slate-300 rounded-md text-sm font-medium text-slate-700 hover:bg-slate-50"
                      >
                        Cancel
                      </button>
                      <button 
                        type="submit" 
                        disabled={!quickCommentText.trim()}
                        className="px-4 py-2 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 shadow-sm disabled:opacity-50"
                      >
                        Save Comment
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* Toast Notification Container */}
          {toast && (
            <div className="fixed bottom-4 right-4 z-50">
              <div className={`flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border transition-all duration-300 ${toast.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-emerald-50 border-emerald-200 text-emerald-800'}`}>
                {toast.type === 'error' ? <AlertCircle className="w-5 h-5" /> : <CheckCircle className="w-5 h-5" />}
                <p className="text-sm font-medium">{toast.message}</p>
                <button onClick={() => setToast(null)} className="ml-2 text-slate-400 hover:text-slate-600">
                  <X className="w-4 h-4" />
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
