  const [iType, setIType]                 = useState('new');
  const [iBase, setIBase]                 = useState('');
  const [iTitle, setITitle]               = useState('');
  const [iSub, setISub]                   = useState('');
  const [iContr, setIContr]               = useState('');
  const [iRev, setIRev]                   = useState(0);
  const [iSla, setISla]                   = useState(14);
  const [iComp, setIComp]                 = useState('');
  const [iDisc, setIDisc]                 = useState('');
  const [iDocs, setIDocs]                 = useState('');
  const [iFile, setIFile]                 = useState(null);
  const [outFile, setOutFile]             = useState(null);
  const [toast, setToast]                 = useState(null);
  const activeIdRef = useRef(null);

  useEffect(() => { activeIdRef.current = activeRec?.id ?? null; }, [activeRec]);

  const showToast = (msg, type = 'success') => {
    setToast({ message: msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  // Resolved identity: look up logged-in user by email in team registry
  const activeUser = useMemo(() => {
    if (!user) return { id:'guest', name:'Guest' };
    const m = team.find(x => x.email === user.email);
    return { id: user.uid, name: m ? m.name : user.email };
  }, [user, team]);

  const userOptions = useMemo(() => {
    const s = new Set(['Unassigned']);
    s.add(activeUser.name);
    team.forEach(m => s.add(m.name));
    return Array.from(s);
  }, [activeUser.name, team]);

  // Sync controlled routing inputs when active record changes
  useEffect(() => {
    setAssignedIn(activeRec?.assignedTo ?? '');
    setQcIn(activeRec?.qcReviewer ?? '');
  }, [activeRec?.id]);

  // Reset filters on module switch
  useEffect(() => {
    setFProject(''); setFIntSt(''); setFExtSt(''); setFAssignee(''); setFSla('');
    setShowFilters(false); setSortField('dateReceived'); setSortDir('desc');
  }, [activeModule]);

  // Reset per-view state
  useEffect(() => {
    if (currentView === 'intake') {
      setIProj(''); setIType('new'); setIBase(''); setITitle(''); setISub('');
      setIContr(''); setIRev(0); setISla(14); setIComp(''); setIDisc('');
      setIDocs(''); setIFile(null); setProgress(0);
    }
    if (currentView !== 'detail') { setIsEditing(false); setNewComment(''); setOutFile(null); setProgress(0); }
    if (currentView !== 'projects') { setProjForm({ id:'', name:'', client:'' }); setEditingProj(false); }
    if (currentView !== 'team') { setTeamForm({ id:'', name:'', email:'', role:'Structural Engineer' }); setEditingTeam(false); }
  }, [currentView, activeModule]);

  // Revision autofill
  useEffect(() => {
    if (iType === 'revision' && iBase) {
      const b = records.find(s => s.id === iBase);
      if (b) { setITitle(b.title); setISub(b.subtitle||''); setIContr(b.contractor); setIRev(Number(b.revision)+1); setISla(b.slaDays||14); setIDocs(b.relatedDocs||''); }
    }
  }, [iType, iBase, records]);

  // Auth listener
  useEffect(() => {
    const u = auth.onAuthStateChanged(u => { setUser(u); setAuthLoading(false); });
    return () => u();
  }, []);

  const doAuth = async e => {
    e.preventDefault(); setAuthLoading(true);
    try {
      if (authMode === 'login') { await auth.signInWithEmailAndPassword(authEmail, authPw); showToast('Signed in.'); }
      else { await auth.createUserWithEmailAndPassword(authEmail, authPw); showToast('Account created.'); }
    } catch (err) { showToast(err.message, 'error'); }
    finally { setAuthLoading(false); }
  };

  // Firestore listeners
  useEffect(() => {
    if (!user) return;
    setLoading(true);
    const r = db.collection(activeModule).onSnapshot(snap => {
      const d = snap.docs.map(x => ({ id: x.id, ...x.data() }));
      d.sort((a, b) => new Date(b.dateReceived) - new Date(a.dateReceived));
      setRecords(d);
      if (activeIdRef.current) { const u = d.find(s => s.id === activeIdRef.current); if (u) setActiveRec(u); }
      setLoading(false);
    }, err => { console.error(err); setLoading(false); });
    const p = db.collection('projects').onSnapshot(snap => {
      const d = snap.docs.map(x => ({ id: x.id, ...x.data() }));
      d.sort((a, b) => a.name.localeCompare(b.name)); setProjects(d);
    });
    const t = db.collection('teamMembers').onSnapshot(snap => {
      const d = snap.docs.map(x => ({ id: x.id, ...x.data() }));
      d.sort((a, b) => a.name.localeCompare(b.name)); setTeam(d);
    });
    return () => { r(); p(); t(); };
  }, [user, activeModule]);

  // Project CRUD
  const saveProj = async e => {
    e.preventDefault();
    try {
      if (editingProj) { await db.collection('projects').doc(projForm.id).update({ name:projForm.name, client:projForm.client }); showToast('Updated.'); }
      else { await db.collection('projects').doc(`PRJ-${Date.now().toString().slice(-4)}`).set({ name:projForm.name, client:projForm.client, createdAt:new Date().toISOString() }); showToast('Project added.'); }
      setProjForm({ id:'', name:'', client:'' }); setEditingProj(false);
    } catch { showToast('Error.', 'error'); }
  };
  const delProj = async id => { try { await db.collection('projects').doc(id).delete(); showToast('Removed.'); } catch { showToast('Error.', 'error'); } };

  // Team CRUD
  const saveTeam = async e => {
    e.preventDefault();
    try {
      if (editingTeam) { await db.collection('teamMembers').doc(teamForm.id).update({ name:teamForm.name, email:teamForm.email, role:teamForm.role }); showToast('Updated.'); }
      else { await db.collection('teamMembers').doc(`USR-${Date.now().toString().slice(-4)}`).set({ name:teamForm.name, email:teamForm.email, role:teamForm.role, createdAt:new Date().toISOString() }); showToast('Added.'); }
      setTeamForm({ id:'', name:'', email:'', role:'Structural Engineer' }); setEditingTeam(false);
    } catch { showToast('Error.', 'error'); }
  };
  const delTeam = async id => { try { await db.collection('teamMembers').doc(id).delete(); showToast('Removed.'); } catch { showToast('Error.', 'error'); } };

  // File upload
  const uploadFile = (file, path) => new Promise((res, rej) => {
    const task = storage.ref().child(path).put(file);
    task.on('state_changed',
      s => setProgress(Math.round(s.bytesTransferred / s.totalBytes * 100)),
      err => rej(err),
      async () => { try { res(await task.snapshot.ref.getDownloadURL()); } catch(e) { rej(e); } }
    );
  });

  // Intake
  const doIntake = async e => {
    e.preventDefault(); if (!user) return;
    setUploading(true); setProgress(0);
    const pfx = activeModule === 'submittals' ? 'SUB' : 'RFI';
    const rid = `${pfx}-${Date.now().toString().slice(-6)}`;
    const sla = Number(iSla) || 14;
    let fileUrl = null;
    try {
      if (iFile) { const ext = iFile.name.split('.').pop(); fileUrl = await uploadFile(iFile, `projects/${iProj}/${activeModule}/${rid}/Incoming_Rev${iRev}.${ext}`); }
      const tags = { components: iComp.split(',').map(s => s.trim()).filter(Boolean), disciplines: iDisc.split(',').map(s => s.trim()).filter(Boolean) };
      const rawA = e.target.elements.assignedTo.value.trim();
      const rawB = e.target.elements.ballInCourt.value || '—';
      await db.collection(activeModule).doc(rid).set({
        projectId: iProj, projectName: projects.find(p => p.id === iProj)?.name || 'Unknown',
        title: iTitle, subtitle: iSub || '', contractor: iContr,
        revision: Number(iRev), baseSubmittalId: iBase || null,
        dateReceived: new Date().toISOString(), slaDays: sla,
        dueDate: new Date(Date.now() + sla * 86400000).toISOString(),
        assignedTo: rawA || 'Unassigned', ballInCourt: rawB,
        internalStatus: (!rawA || rawA === 'Unassigned') ? 'Unassigned' : 'Assigned',
        externalStatus: 'Pending', incomingPdfRef: fileUrl, incomingFileName: iFile ? iFile.name : null,
        outgoingPdfRef: null, outgoingFileName: null, relatedDocs: iDocs.trim(),
        comments: [], tags, loggedBy: activeUser.name, loggedById: activeUser.id, qcReviewer: '',
        history: [{ timestamp: new Date().toISOString(), action: `Ingested ${activeModule.slice(0,-1)}${iFile ? ' with attachment' : ''}`, user: activeUser.name }]
      });
      showToast(`${termMod} logged.`); setCurrentView('dashboard');
    } catch(err) { console.error(err); showToast('Error saving.', 'error'); }
    finally { setUploading(false); setProgress(0); }
  };

  const doOutgoing = async () => {
    if (!outFile || !activeRec || !user) return;
    setUploading(true); setProgress(0);
    try {
      const ext = outFile.name.split('.').pop();
      const url = await uploadFile(outFile, `projects/${activeRec.projectId}/${activeModule}/${activeRec.id}/Markups_Rev${activeRec.revision}.${ext}`);
      await db.collection(activeModule).doc(activeRec.id).update({ outgoingPdfRef: url, outgoingFileName: outFile.name, history: AU({ timestamp: new Date().toISOString(), action: `Uploaded Redlined Response (${outFile.name})`, user: activeUser.name }) });
      showToast('Markups uploaded.'); setOutFile(null);
    } catch { showToast('Upload failed.', 'error'); }
    finally { setUploading(false); setProgress(0); }
  };

  const updateStatus = async (id, data) => {
    try { await db.collection(activeModule).doc(id).update({ ...data, history: AU({ timestamp: new Date().toISOString(), action: `Updated: ${Object.keys(data).join(', ')}`, user: activeUser.name }) }); showToast('Saved.'); }
    catch { showToast('Error.', 'error'); }
  };

  const deleteRecord = async id => {
    if (!window.confirm(`Permanently delete this ${termMod}?`)) return;
    try { await db.collection(activeModule).doc(id).delete(); showToast('Deleted.'); setActiveRec(null); setCurrentView('dashboard'); }
    catch { showToast('Error.', 'error'); }
  };

  const doEditSubmit = async e => {
    e.preventDefault();
    try {
      const sd = Number(editForm.slaDays) || 14;
      const dd = new Date(new Date(activeRec.dateReceived).getTime() + sd * 86400000).toISOString();
      await db.collection(activeModule).doc(activeRec.id).update({ title:editForm.title, subtitle:editForm.subtitle, contractor:editForm.contractor, revision:Number(editForm.revision), slaDays:sd, dueDate:dd, relatedDocs:editForm.relatedDocs, history: AU({ timestamp:new Date().toISOString(), action:'Edited Metadata', user:activeUser.name }) });
      setIsEditing(false); showToast('Updated.');
    } catch { showToast('Error.', 'error'); }
  };

  const addComment = async e => {
    e.preventDefault(); if (!newComment.trim()) return;
    const c = { id: Date.now().toString(), text: newComment.trim(), user: activeUser.name, timestamp: new Date().toISOString() };
    try { await db.collection(activeModule).doc(activeRec.id).update({ comments: AU(c) }); setNewComment(''); }
    catch { showToast('Error.', 'error'); }
  };

  const addQuickComment = async e => {
    e.preventDefault(); if (!quickText.trim() || !quickModal) return;
    const c = { id: Date.now().toString(), text: quickText.trim(), user: activeUser.name, timestamp: new Date().toISOString() };
    try { await db.collection(activeModule).doc(quickModal.id).update({ comments: AU(c) }); showToast('Comment added.'); setQuickModal(null); setQuickText(''); }
    catch { showToast('Error.', 'error'); }
  };

  const handleSort = f => { if (sortField === f) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortField(f); setSortDir('desc'); } };

  const exportCSV = () => {
    const lbl = isRfi ? 'RFI' : 'Submittal';
    const h = [`${lbl} ID`, termRev, 'Title', termSub, 'Project', 'Contractor', 'Ball in Court', 'Logged By', 'Internal Status', 'External Status', 'Assigned To', 'QC Reviewer', 'Date Received', 'SLA Days', 'Due Date', 'Components', 'Disciplines', 'Related Docs'];
    const q = s => `"${(s||'').replace(/"/g,'""')}"`;
    const rows = treeRecs.filter(r => !r.isVirtual).map(s => [s.id, s.revision, q(s.title), q(s.subtitle), q(s.projectName), q(s.contractor), s.ballInCourt||'—', q(s.loggedBy), s.internalStatus, s.externalStatus, q(s.assignedTo||'Unassigned'), q(s.qcReviewer), new Date(s.dateReceived).toLocaleDateString(), s.slaDays, new Date(s.dueDate).toLocaleDateString(), q((s.tags?.components||[]).join(', ')), q((s.tags?.disciplines||[]).join(', ')), q(s.relatedDocs)]);
    const csv = 'data:text/csv;charset=utf-8,' + [h.join(','), ...rows.map(r => r.join(','))].join('\n');
    const a = document.createElement('a'); a.href = encodeURI(csv); a.download = `${lbl}_Log_${new Date().toISOString().split('T')[0]}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    showToast('Export complete.');
  };

  // Derived
  const isRfi    = activeModule === 'rfis';
  const termMod  = isRfi ? 'RFI' : 'Submittal';
  const termRev  = isRfi ? 'RFI No.' : 'Revision';
  const termSub  = isRfi ? 'Proposed Solution / Reason' : 'Description / Spec Reference';
  const activeFC = [fProject, fIntSt, fExtSt, fAssignee, fSla].filter(Boolean).length;

  const filteredRecs = useMemo(() => records.filter(s => {
    const ms = !searchQ || s.title.toLowerCase().includes(searchQ.toLowerCase()) || s.projectName.toLowerCase().includes(searchQ.toLowerCase());
    const mp = !fProject  || s.projectId === fProject;
    const mi = !fIntSt    || s.internalStatus === fIntSt;
    const me = !fExtSt    || s.externalStatus === fExtSt;
    const ma = !fAssignee || s.assignedTo === fAssignee;
    const { dr } = getSla(s);
    const msl = !fSla || (fSla === 'overdue' && dr < 0) || (fSla === 'at-risk' && dr >= 0 && dr <= 3) || (fSla === 'on-track' && dr > 3);
    const base = ms && mp && mi && me && ma && msl;
    if (tab === 'my-queue') return base && s.assignedTo === activeUser.name && s.internalStatus !== 'Sent Out';
    return base;
  }), [records, searchQ, fProject, fIntSt, fExtSt, fAssignee, fSla, tab, activeUser.name]);

  const slaCounts = useMemo(() => {
    const items = records.filter(s => s.internalStatus !== 'Sent Out');
    return items.reduce((a, s) => {
      const { dr } = getSla(s);
      if (dr < 0) a.overdue++; else if (dr <= 3) a.atRisk++; else a.onTrack++;
      return a;
    }, { onTrack:0, atRisk:0, overdue:0 });
  }, [records]);

  const treeRecs = useMemo(() => {
    const map = {}; filteredRecs.forEach(s => { map[s.id] = { ...s, children: [] }; });
    const roots = []; filteredRecs.forEach(s => { if (s.baseSubmittalId && map[s.baseSubmittalId]) map[s.baseSubmittalId].children.push(map[s.id]); else roots.push(map[s.id]); });
    const gmx = n => { let m = new Date(n.dateReceived).getTime(); n.children.forEach(c => { const cm = gmx(c); if (cm > m) m = cm; }); return m; };
    const gmd = n => { let m = new Date(n.dueDate).getTime(); n.children.forEach(c => { const cm = new Date(c.dueDate).getTime(); if (cm < m) m = cm; }); return m; };
    if (sortField === 'title') roots.sort((a, b) => sortDir === 'asc' ? a.title.localeCompare(b.title) : b.title.localeCompare(a.title));
    else if (sortField === 'dueDate') roots.sort((a, b) => sortDir === 'asc' ? gmd(a) - gmd(b) : gmd(b) - gmd(a));
    else roots.sort((a, b) => sortDir === 'asc' ? gmx(a) - gmx(b) : gmx(b) - gmx(a));
    const flat = [];
    roots.forEach(r => {
      const all = [r, ...r.children].sort((a, b) => a.revision - b.revision);
      flat.push({ isVirtual:true, id:`G-${r.id}`, title:r.title, projectName:r.projectName, contractor:r.contractor, cnt:all.length });
      all.forEach(x => { x.indentLevel = 1; flat.push(x); });
    });
    return flat;
  }, [filteredRecs, sortField, sortDir]);

  // ── Auth screens ────────────────────────────────────────────────────────────
  if (authLoading) return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ textAlign:'center' }}>
        <ICloud size={32} style={{ color:'#3b82f6', margin:'0 auto 12px', display:'block' }}/>
        <p style={{ color:'#64748b', fontSize:14 }}>Initializing…</p>
      </div>
    </div>
  );

  if (!user) return (
    <div style={{ minHeight:'100vh', background:'#f1f5f9', display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
      <div style={{ width:'100%', maxWidth:380 }}>
        <div style={{ textAlign:'center', marginBottom:28 }}>
          <div style={{ display:'inline-flex', background:'#0f172a', borderRadius:12, padding:14, marginBottom:16 }}>
            <svg width="36" height="36" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="34" height="34" rx="7" fill="#1e3a8a"/>
              <path d="M9 7h11l5 5v15a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z" fill="white" fillOpacity="0.1" stroke="white" strokeWidth="1.2"/>
              <path d="M20 7l5 5h-4a1 1 0 0 1-1-1V7z" fill="white" fillOpacity="0.22"/>
              <line x1="11.5" y1="15" x2="20" y2="15" stroke="white" strokeWidth="1.1" strokeLinecap="round" strokeOpacity="0.65"/>
              <line x1="11.5" y1="18" x2="22" y2="18" stroke="white" strokeWidth="1.1" strokeLinecap="round" strokeOpacity="0.65"/>
              <line x1="11.5" y1="21" x2="17" y2="21" stroke="white" strokeWidth="1.1" strokeLinecap="round" strokeOpacity="0.65"/>
              <circle cx="23.5" cy="24.5" r="5.5" fill="#10b981"/>
              <polyline points="20.8,24.5 22.8,26.5 26.2,22.5" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <h1 style={{ fontSize:22, fontWeight:700, color:'#0f172a', letterSpacing:'-.02em', margin:'0 0 4px' }}>Construction Submittal Tracker</h1>
          <div style={{ fontSize:12, color:'#94a3b8', margin:'0 0 4px' }}>by Mario LoCoco</div>
          <p style={{ fontSize:13, color:'#64748b', margin:0 }}>{authMode === 'login' ? 'Sign in to access project records' : 'Create a new account'}</p>
        </div>
        <div className="card" style={{ padding:28 }}>
          <form onSubmit={doAuth} style={{ display:'flex', flexDirection:'column', gap:16 }}>
            <div><FL>Email Address</FL><input className="inp" type="email" required value={authEmail} onChange={e => setAuthEmail(e.target.value)} placeholder="engineer@firm.com"/></div>
            <div><FL>Password</FL><input className="inp" type="password" required value={authPw} onChange={e => setAuthPw(e.target.value)} placeholder="••••••••"/></div>
            <button className="btn-p" type="submit" style={{ justifyContent:'center', marginTop:4 }}>{authMode === 'login' ? 'Sign In' : 'Create Account'}</button>
          </form>
          <div style={{ textAlign:'center', marginTop:16 }}>
            <button onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} style={{ fontSize:13, color:'#2563eb', background:'none', border:'none', cursor:'pointer' }}>
              {authMode === 'login' ? 'Need an account? Register.' : 'Have an account? Sign in.'}
            </button>
          </div>
        </div>
      </div>
      <Toast toast={toast} dismiss={() => setToast(null)}/>
    </div>
  );

  // ── Shared column config ────────────────────────────────────────────────────
  const SortTh = ({ label, field, style: s = {} }) => (
    <th className="th" style={{ cursor:'pointer', userSelect:'none', ...s }} onClick={() => handleSort(field)}>
      <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
        {label}
        {sortField === field ? (sortDir === 'asc' ? <IArrUp size={10}/> : <IArrDn size={10}/>) : <span style={{ color:'#cbd5e1', fontSize:10 }}>↕</span>}
      </span>
    </th>
  );

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar activeModule={activeModule} setActiveModule={m => { setActiveModule(m); }} currentView={currentView} setCurrentView={setCurrentView} isRfi={isRfi} termMod={termMod} user={user} activeUser={activeUser} doLogout={async () => { await auth.signOut(); showToast('Signed out.'); }} activeRecords={records}/>

      <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column' }}>
        {/* Topbar */}
        <div style={{ background:'#fff', borderBottom:'1px solid #e2e8f0', padding:'0 24px', height:50, display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, zIndex:10 }}>
          <span style={{ fontSize:13, fontWeight:600, color:'#0f172a' }}>
            {currentView === 'dashboard' ? `${termMod} Register` : currentView === 'analytics' ? 'Analytics' : currentView === 'projects' ? 'Project Administration' : currentView === 'team' ? 'Team Management' : currentView === 'intake' ? `Log ${termMod}` : activeRec?.title || 'Record Detail'}
          </span>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            {currentView === 'dashboard' && <>
              <div style={{ position:'relative' }}>
                <ISearch size={13} style={{ position:'absolute', left:9, top:'50%', transform:'translateY(-50%)', color:'#94a3b8', pointerEvents:'none' }}/>
                <input className="inp" placeholder="Search…" style={{ paddingLeft:29, width:180, fontSize:12, height:32 }} value={searchQ} onChange={e => setSearchQ(e.target.value)}/>
              </div>
              <button className="btn-s" style={{ fontSize:12, padding:'5px 10px', position:'relative' }} onClick={() => setShowFilters(f => !f)}>
                <IFilter size={13}/> Filters
                {activeFC > 0 && <span style={{ position:'absolute', top:-5, right:-5, width:16, height:16, background:'#2563eb', color:'#fff', borderRadius:'50%', fontSize:10, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>{activeFC}</span>}
              </button>
              <button className="btn-s" style={{ fontSize:12, padding:'5px 10px' }} onClick={exportCSV}><IDl size={13}/> Export</button>
              <button className="btn-p" style={{ fontSize:12, padding:'5px 12px' }} onClick={() => setCurrentView('intake')}><IPlus size={13}/> Log {termMod}</button>
            </>}
            {currentView === 'intake' && <button className="btn-s" style={{ fontSize:12 }} disabled={uploading} onClick={() => setCurrentView('dashboard')}><IArrow size={13}/> Back</button>}
            {currentView === 'detail' && (
              <div style={{ display:'flex', gap:8 }}>
                <button className="btn-s" style={{ fontSize:12 }} onClick={() => { setActiveRec(null); setCurrentView('dashboard'); }}><IArrow size={13}/> Back</button>
                <button onClick={() => deleteRecord(activeRec.id)} style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'5px 12px', background:'#fef2f2', color:'#dc2626', border:'1px solid #fecaca', borderRadius:5, fontSize:12, fontWeight:500, cursor:'pointer' }}><ITrash size={13}/> Delete</button>
              </div>
            )}
          </div>
        </div>

        {/* Page content */}
        <div style={{ flex:1, padding:20, overflowY:'auto' }}>

          {/* ── PROJECTS ──────────────────────────────────────────────────── */}
          {currentView === 'projects' && (
            <div style={{ display:'grid', gridTemplateColumns:'280px 1fr', gap:18, maxWidth:880 }}>
              <div className="card" style={{ padding:18, alignSelf:'start' }}>
                <div style={{ fontWeight:600, fontSize:13, color:'#0f172a', marginBottom:14, paddingBottom:10, borderBottom:'1px solid #f1f5f9' }}>{editingProj ? 'Edit Project' : 'New Project'}</div>
                <form onSubmit={saveProj} style={{ display:'flex', flexDirection:'column', gap:12 }}>
                  <div><FL>Contract / Project Name</FL><input className="inp" required placeholder="e.g. I-95 Viaduct Replacement" value={projForm.name} onChange={e => setProjForm({ ...projForm, name:e.target.value })}/></div>
                  <div><FL>Client / Owner</FL><input className="inp" required placeholder="e.g. State DOT" value={projForm.client} onChange={e => setProjForm({ ...projForm, client:e.target.value })}/></div>
                  <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:4 }}>
                    {editingProj && <button type="button" className="btn-s" style={{ fontSize:12 }} onClick={() => { setEditingProj(false); setProjForm({ id:'', name:'', client:'' }); }}>Cancel</button>}
                    <button type="submit" className="btn-p" style={{ fontSize:12 }}>{editingProj ? 'Update' : 'Create'}</button>
                  </div>
                </form>
              </div>
              <div className="card" style={{ overflow:'hidden' }}>
                <table style={{ width:'100%', borderCollapse:'collapse' }}>
                  <thead><tr><th className="th">Project</th><th className="th">Client</th><th className="th" style={{ width:72, textAlign:'right' }}>Actions</th></tr></thead>
                  <tbody>
                    {projects.length === 0 ? <tr><td className="td" colSpan="3" style={{ textAlign:'center', color:'#94a3b8', fontStyle:'italic' }}>No projects configured.</td></tr> :
                      projects.map(p => (
                        <tr key={p.id} className="tr-data">
                          <td className="td"><div style={{ fontWeight:600, color:'#0f172a' }}>{p.name}</div><div style={{ fontSize:11, color:'#94a3b8', fontFamily:'monospace', marginTop:2 }}>{p.id}</div></td>

                          <td className="td" style={{ textAlign:'right' }}>
                            <div style={{ display:'flex', justifyContent:'flex-end', gap:4 }}>
                              <button onClick={() => { setProjForm({ id:p.id, name:p.name, client:p.client }); setEditingProj(true); }} style={{ background:'none', border:'none', cursor:'pointer', color:'#64748b', padding:4, borderRadius:4, display:'flex' }}><IEdit size={13}/></button>
                              <button onClick={() => { if (window.confirm(`Remove "${p.name}"?`)) delProj(p.id); }} style={{ background:'none', border:'none', cursor:'pointer', color:'#ef4444', padding:4, borderRadius:4, display:'flex' }}><ITrash size={13}/></button>
                            </div>
                          </td>
                        </tr>
                      ))
                    }
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ── TEAM ──────────────────────────────────────────────────────── */}
          {currentView === 'team' && (
            <div style={{ display:'grid', gridTemplateColumns:'280px 1fr', gap:18, maxWidth:880 }}>
              <div className="card" style={{ padding:18, alignSelf:'start' }}>
                <div style={{ fontWeight:600, fontSize:13, color:'#0f172a', marginBottom:6, paddingBottom:10, borderBottom:'1px solid #f1f5f9' }}>{editingTeam ? 'Edit Member' : 'Add Team Member'}</div>
                <p style={{ fontSize:11, color:'#64748b', marginBottom:12, marginTop:8 }}>Email must match the login email for name resolution to work.</p>
                <form onSubmit={saveTeam} style={{ display:'flex', flexDirection:'column', gap:12 }}>
                  <div><FL>Full Name</FL><input className="inp" required placeholder="e.g. Sarah Jenkins" value={teamForm.name} onChange={e => setTeamForm({ ...teamForm, name:e.target.value })}/></div>
                  <div><FL>Login Email</FL><input className="inp" type="email" required placeholder="e.g. sjenkins@firm.com" value={teamForm.email} onChange={e => setTeamForm({ ...teamForm, email:e.target.value })}/></div>
                  <div><FL>Role / Title</FL><input className="inp" placeholder="e.g. Structural Engineer" value={teamForm.role} onChange={e => setTeamForm({ ...teamForm, role:e.target.value })}/></div>
                  <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:4 }}>
                    {editingTeam && <button type="button" className="btn-s" style={{ fontSize:12 }} onClick={() => { setEditingTeam(false); setTeamForm({ id:'', name:'', email:'', role:'Structural Engineer' }); }}>Cancel</button>}
                    <button type="submit" className="btn-p" style={{ fontSize:12 }}><IUPlus size={13}/>{editingTeam ? 'Update' : 'Add Member'}</button>
                  </div>
                </form>
              </div>
              <div className="card" style={{ overflow:'hidden' }}>
                <table style={{ width:'100%', borderCollapse:'collapse' }}>
                  <thead><tr><th className="th">Name / Role</th><th className="th">Email</th><th className="th" style={{ width:72, textAlign:'right' }}>Actions</th></tr></thead>
                  <tbody>
                    {team.length === 0 ? <tr><td className="td" colSpan="3" style={{ textAlign:'center', color:'#94a3b8', fontStyle:'italic' }}>No team members configured.</td></tr> :
                      team.map(m => (
                        <tr key={m.id} className="tr-data">
                          <td className="td"><div style={{ fontWeight:600, color:'#0f172a' }}>{m.name}</div><div style={{ fontSize:11, color:'#94a3b8', marginTop:2 }}>{m.role}</div></td>
                          <td className="td" style={{ fontSize:12, color:'#475569' }}>{m.email}</td>
                          <td className="td" style={{ textAlign:'right' }}>
                            <div style={{ display:'flex', justifyContent:'flex-end', gap:4 }}>
                              <button onClick={() => { setTeamForm({ id:m.id, name:m.name, email:m.email, role:m.role }); setEditingTeam(true); }} style={{ background:'none', border:'none', cursor:'pointer', color:'#64748b', padding:4, borderRadius:4, display:'flex' }}><IEdit size={13}/></button>
                              <button onClick={() => { if (window.confirm(`Remove "${m.name}"?`)) delTeam(m.id); }} style={{ background:'none', border:'none', cursor:'pointer', color:'#ef4444', padding:4, borderRadius:4, display:'flex' }}><ITrash size={13}/></button>
                            </div>
                          </td>
                        </tr>
                      ))
                    }
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ── DASHBOARD ─────────────────────────────────────────────────── */}
          {currentView === 'dashboard' && (
            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>

              {/* SLA strip */}
              <div className="card" style={{ padding:'10px 16px', display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontSize:11, fontWeight:700, color:'#64748b', letterSpacing:'.06em', textTransform:'uppercase', marginRight:12, whiteSpace:'nowrap' }}>SLA Status</span>
                {[
                  { k:'on-track', label:'On Track',  n:slaCounts.onTrack, dot:'#16a34a', bg:'#f0fdf4', border:'#bbf7d0', fg:'#14532d' },
                  { k:'at-risk',  label:'At Risk',   n:slaCounts.atRisk,  dot:'#d97706', bg:'#fffbeb', border:'#fde68a', fg:'#78350f' },
                  { k:'overdue',  label:'Overdue',   n:slaCounts.overdue, dot:'#dc2626', bg:'#fef2f2', border:'#fecaca', fg:'#7f1d1d' },
                ].map(({ k, label, n, dot, bg, border, fg }) => (
                  <button key={k} onClick={() => setFSla(fSla === k ? '' : k)}
                    style={{ display:'flex', alignItems:'center', gap:7, padding:'5px 14px', borderRadius:4, border:`1px solid ${fSla === k ? dot : border}`, background: fSla === k ? bg : 'transparent', cursor:'pointer', transition:'all .15s' }}>
                    <span style={{ width:8, height:8, borderRadius:'50%', background:dot, display:'block', flexShrink:0 }}></span>
                    <span style={{ fontSize:14, fontWeight:800, color:dot, lineHeight:1 }}>{n}</span>
                    <span style={{ fontSize:12, color:'#475569', fontWeight:500 }}>{label}</span>
                  </button>
                ))}
                <div style={{ marginLeft:'auto', fontSize:12, color:'#94a3b8' }}>
                  {records.filter(s => s.internalStatus !== 'Sent Out').length} active {isRfi ? 'RFIs' : 'submittals'}
                </div>
              </div>

              {/* Filter panel */}
              {showFilters && (
                <div className="card" style={{ padding:'12px 16px' }}>
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:10, alignItems:'end' }}>
                    <div><FL>Project</FL><select className="sel" style={{ fontSize:12 }} value={fProject} onChange={e => setFProject(e.target.value)}><option value="">All Projects</option>{projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
                    <div><FL>Internal Status</FL><select className="sel" style={{ fontSize:12 }} value={fIntSt} onChange={e => setFIntSt(e.target.value)}><option value="">All</option>{INT_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                    <div><FL>Official Status</FL><select className="sel" style={{ fontSize:12 }} value={fExtSt} onChange={e => setFExtSt(e.target.value)}><option value="">All</option>{EXT_STATUSES[activeModule].map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                    <div><FL>Assignee</FL><select className="sel" style={{ fontSize:12 }} value={fAssignee} onChange={e => setFAssignee(e.target.value)}><option value="">All</option>{userOptions.map(n => <option key={n} value={n}>{n}</option>)}</select></div>
                    <div style={{ display:'flex', alignItems:'flex-end' }}>
                      {activeFC > 0 && <button onClick={() => { setFProject(''); setFIntSt(''); setFExtSt(''); setFAssignee(''); setFSla(''); }} style={{ background:'none', border:'none', cursor:'pointer', color:'#ef4444', fontSize:12, fontWeight:500, display:'flex', alignItems:'center', gap:4, padding:'7px 0', whiteSpace:'nowrap' }}><IX size={13}/>Clear all</button>}
                    </div>
                  </div>
                </div>
              )}

              {/* Tabs */}
              <div style={{ display:'flex', borderBottom:'1px solid #e2e8f0' }}>
                {[
                  { k:'my-queue', label:`My Queue (${records.filter(s => s.assignedTo === activeUser.name && s.internalStatus !== 'Sent Out').length})` },
                  { k:'all', label:`All Active ${isRfi ? 'RFIs' : 'Submittals'}` },
                ].map(({ k, label }) => (
                  <button key={k} onClick={() => setTab(k)} style={{ padding:'8px 16px', fontSize:13, fontWeight:600, color: tab === k ? '#2563eb' : '#64748b', border:'none', background:'none', borderBottom:`2px solid ${tab === k ? '#2563eb' : 'transparent'}`, cursor:'pointer', marginBottom:-1 }}>
                    {label}
                  </button>
                ))}
              </div>

              <div className="card" style={{ overflow:'hidden' }}>
                {loading ? (
                  <div style={{ padding:40, textAlign:'center', color:'#94a3b8', fontSize:13 }}>Loading {activeModule}…</div>

                  <div style={{ padding:48, textAlign:'center' }}>
                    <ICheck size={28} style={{ color:'#cbd5e1', margin:'0 auto 10px', display:'block' }}/>
                    <div style={{ fontSize:14, fontWeight:600, color:'#334155' }}>No items match the current filters</div>
                    <div style={{ fontSize:12, color:'#94a3b8', marginTop:4 }}>Try adjusting your search or filter criteria</div>
                  </div>
                ) : (
                  <div style={{ overflowX:'auto' }}>
                    <table style={{ width:'100%', borderCollapse:'collapse', minWidth:860 }}>
                      <thead>
                        <tr>
                          <SortTh label={termMod} field="title" style={{ minWidth:260 }}/>
                          <th className="th" style={{ minWidth:120 }}>Project</th>
                          <SortTh label="Timeline" field="dueDate" style={{ minWidth:140 }}/>
                          <th className="th" style={{ minWidth:150 }}>Routing / BIC</th>
                          <SortTh label="Aging" field="dateReceived" style={{ minWidth:90 }}/>
                          <th className="th" style={{ width:80 }}></th>
                        </tr>
                      </thead>
                      <tbody>
                        {treeRecs.map(sub => {
                          if (sub.isVirtual) return (
                            <tr key={sub.id} style={{ background:'#f8fafc', borderTop:'2px solid #e2e8f0', borderBottom:'1px solid #e2e8f0' }}>
                              <td className="td" style={{ paddingTop:8, paddingBottom:8 }}>
                                <div style={{ fontWeight:700, color:'#0f172a', fontSize:13 }}>{sub.title}</div>
                                <div style={{ fontSize:10, color:'#94a3b8', fontWeight:600, letterSpacing:'.06em', textTransform:'uppercase', marginTop:2 }}>{termMod} Thread · {sub.cnt} record{sub.cnt > 1 ? 's' : ''}</div>
                              </td>
                              <td className="td" style={{ paddingTop:8, paddingBottom:8 }}>
                                <div style={{ fontSize:12, fontWeight:500, color:'#334155' }}>{sub.projectName}</div>
                                <div style={{ fontSize:11, color:'#94a3b8' }}>{sub.contractor}</div>
                              </td>
                              <td colSpan="4" className="td" style={{ paddingTop:8, paddingBottom:8 }}></td>
                            </tr>
                          );
                          const { de, dr, isLate } = getSla(sub);
                          const bic = sub.ballInCourt || '—';
                          const intSt = sub.internalStatus || 'Unassigned';
                          return (
                            <tr key={sub.id} className="tr-data">
                              <td className="td">
                                <div style={{ display:'flex', alignItems:'flex-start', gap:6, paddingLeft: sub.indentLevel * 16 }}>
                                  {sub.indentLevel > 0 && <ICR size={13} style={{ color:'#cbd5e1', marginTop:3, flexShrink:0 }}/>}
                                  <div>
                                    <div style={{ fontWeight:600, color:'#0f172a', fontSize:13, lineHeight:1.35 }}>{sub.title}</div>
                                    {sub.subtitle && <div style={{ fontSize:11, color:'#64748b', marginTop:1 }}>{sub.subtitle}</div>}
                                    <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:4 }}>
                                      <span style={{ fontSize:10, color:'#94a3b8', fontFamily:'monospace' }}>{sub.id} · {termRev} {sub.revision}</span>
                                      {sub.relatedDocs && <span style={{ display:'inline-flex', alignItems:'center', gap:3, fontSize:10, color:'#3b82f6', background:'#eff6ff', padding:'1px 6px', borderRadius:3, border:'1px solid #bfdbfe' }}><ILink size={9}/>{sub.relatedDocs}</span>}
                                    </div>
                                    {(sub.tags?.components?.length > 0 || sub.tags?.disciplines?.length > 0) && (
                                      <div style={{ display:'flex', flexWrap:'wrap', gap:3, marginTop:5 }}>
                                        {sub.tags.components?.map((t, i) => <span key={i} style={{ fontSize:10, fontWeight:600, padding:'1px 6px', borderRadius:3, background:'#eef2ff', color:'#4338ca', border:'1px solid #e0e7ff', display:'inline-flex', alignItems:'center', gap:3 }}><ITag size={9}/>{t}</span>)}
                                        {sub.tags.disciplines?.map((t, i) => <span key={i} style={{ fontSize:10, fontWeight:600, padding:'1px 6px', borderRadius:3, background:'#fffbeb', color:'#92400e', border:'1px solid #fde68a' }}>{t}</span>)}
                                      </div>
                                    )}
                                    <div style={{ fontSize:10, color:'#94a3b8', marginTop:4 }}>Logged by {sub.loggedBy || 'System'}</div>
                                  </div>
                                </div>
                              </td>
                              <td className="td">
                                <div style={{ fontSize:12, fontWeight:500, color:'#1e293b' }}>{sub.projectName}</div>
                                <div style={{ fontSize:11, color:'#94a3b8', marginTop:1 }}>{sub.contractor}</div>
                              </td>
                              <td className="td">
                                <div style={{ fontSize:11, color:'#475569', lineHeight:1.9 }}>
                                  <div><span style={{ color:'#94a3b8', display:'inline-block', width:52 }}>Received</span><span style={{ fontWeight:500 }}>{fmtDate(sub.dateReceived)}</span></div>
                                  <div><span style={{ color:'#94a3b8', display:'inline-block', width:52 }}>SLA</span><span style={{ fontWeight:500 }}>{sub.slaDays}d</span></div>
                                  <div><span style={{ color:'#94a3b8', display:'inline-block', width:52 }}>Due</span><span style={{ fontWeight:600, color: isLate ? '#dc2626' : '#1e293b' }}>{fmtDate(sub.dueDate)}</span></div>
                                </div>
                              </td>
                              <td className="td">
                                <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
                                  <span className="badge" style={INT_STYLE[intSt] || INT_STYLE['Unassigned']}>{intSt}</span>
                                  <div style={{ display:'flex', alignItems:'center', gap:5 }}>
                                    <div style={{ width:18, height:18, borderRadius:'50%', background:'#e2e8f0', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:700, color:'#475569', flexShrink:0 }}>{(sub.assignedTo || 'U').charAt(0).toUpperCase()}</div>
                                    <span style={{ fontSize:11, color:'#475569', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:110 }}>{sub.assignedTo || 'Unassigned'}</span>
                                  </div>
                                  <span className="badge" style={BIC_STYLE[bic] || BIC_STYLE['—']}>{bic}</span>
                                </div>
                              </td>
                              <td className="td">
                                <div style={{ fontSize:12, fontWeight:600, color: isLate ? '#dc2626' : '#475569', display:'flex', alignItems:'center', gap:4 }}><IClock size={13}/>{de}d</div>
                                <div style={{ fontSize:11, fontWeight:700, marginTop:3, color: isLate ? '#dc2626' : dr <= 3 ? '#d97706' : '#16a34a' }}>{isLate ? `${Math.abs(dr)}d over` : `${dr}d left`}</div>
                              </td>
                              <td className="td" style={{ textAlign:'right' }}>
                                <div className="row-acts" style={{ display:'flex', justifyContent:'flex-end', gap:4 }}>
                                  <button onClick={() => setQuickModal(sub)} style={{ background:'none', border:'none', cursor:'pointer', color:'#94a3b8', padding:4, borderRadius:4, display:'flex', alignItems:'center', gap:3 }}>
                                    <IMsg size={13}/>
                                    {sub.comments?.length > 0 && <span style={{ fontSize:10, fontWeight:700, background:'#e2e8f0', color:'#475569', padding:'0 4px', borderRadius:8 }}>{sub.comments.length}</span>}
                                  </button>
                                  <button onClick={() => { setActiveRec(sub); setCurrentView('detail'); }} style={{ background:'#eff6ff', border:'1px solid #bfdbfe', borderRadius:4, cursor:'pointer', color:'#1d4ed8', fontSize:12, fontWeight:600, padding:'3px 10px' }}>Open</button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ── INTAKE ────────────────────────────────────────────────────── */}
          {currentView === 'intake' && (
            <div style={{ maxWidth:620, margin:'0 auto' }}>
              <div className="card" style={{ overflow:'hidden' }}>
                <div style={{ padding:'14px 20px', borderBottom:'1px solid #f1f5f9', display:'flex', alignItems:'center', gap:10 }}>
                  <div style={{ background:'#eff6ff', borderRadius:6, padding:7, display:'flex' }}><IFPlus size={16} style={{ color:'#2563eb' }}/></div>
                  <div>
                    <div style={{ fontWeight:600, fontSize:14, color:'#0f172a' }}>Ingest {termMod}</div>
                    <div style={{ fontSize:12, color:'#64748b' }}>Log an incoming package from a contractor.</div>
                  </div>
                </div>
                {projects.length === 0 ? (
                  <div style={{ padding:32, textAlign:'center', margin:20, border:'2px dashed #fde68a', borderRadius:8, background:'#fffbeb' }}>
                    <IAlert size={24} style={{ color:'#d97706', margin:'0 auto 10px', display:'block' }}/>
                    <div style={{ fontWeight:600, color:'#92400e', marginBottom:6 }}>Configuration Required</div>
                    <div style={{ fontSize:12, color:'#78350f', marginBottom:14 }}>Create at least one project before logging records.</div>
                    <button className="btn-p" style={{ fontSize:12 }} onClick={() => setCurrentView('projects')}>Go to Projects</button>
                  </div>
                ) : (
                  <form onSubmit={doIntake} style={{ padding:20, display:'flex', flexDirection:'column', gap:14 }}>
                    <div style={{ display:'flex', background:'#f8fafc', border:'1px solid #e2e8f0', borderRadius:5, overflow:'hidden', width:'fit-content' }}>
                      {['new','revision'].map(t => (
                        <button key={t} type="button" onClick={() => { setIType(t); if (t === 'new') { setIBase(''); setITitle(''); setIContr(''); setIRev(0); } }}
                          style={{ padding:'6px 16px', fontSize:12, fontWeight:600, background: iType === t ? '#fff' : 'transparent', color: iType === t ? '#1d4ed8' : '#64748b', border:'none', cursor:'pointer', borderRight: t === 'new' ? '1px solid #e2e8f0' : 'none', boxShadow: iType === t ? '0 1px 3px rgba(0,0,0,.1)' : 'none', transition:'all .15s' }}>
                          {t === 'new' ? `New ${termMod}` : 'Revision to Existing'}
                        </button>
                      ))}
                    </div>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                      <div style={{ gridColumn:'1/-1' }}><FL>Project</FL><select className="sel" required value={iProj} onChange={e => { setIProj(e.target.value); setIBase(''); }}><option value="">Select a project…</option>{projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
                      {iType === 'revision' && <div style={{ gridColumn:'1/-1' }}><FL>Base {termMod}</FL><select className="sel" required value={iBase} onChange={e => setIBase(e.target.value)} disabled={!iProj}><option value="">{iProj ? `Select a ${termMod}…` : 'Select a project first…'}</option>{records.filter(s => s.projectId === iProj).map(s => <option key={s.id} value={s.id}>{s.id} – {termRev} {s.revision}: {s.title}</option>)}</select></div>}
                      <div style={{ gridColumn:'1/-1' }}><FL>{isRfi ? 'RFI Question / Title' : 'Submittal Title'}</FL><input className="inp" name="title" required placeholder={isRfi ? 'e.g. Discrepancy at Pier 2' : 'e.g. Abutment 1 Concrete Mix Design'} value={iTitle} onChange={e => setITitle(e.target.value)}/></div>
                      <div style={{ gridColumn:'1/-1' }}><FL>{termSub}</FL><input className="inp" name="subtitle" placeholder={isRfi ? 'e.g. Contractor proposes field welding.' : 'e.g. Spec Section 550'} value={iSub} onChange={e => setISub(e.target.value)}/></div>
                      <div style={{ gridColumn:'1/-1', paddingTop:4, borderTop:'1px solid #f1f5f9' }}>
                        <FL><span style={{ display:'inline-flex', alignItems:'center', gap:4 }}><ILink size={10}/>Plan Sheets & Related Docs</span></FL>
                        <input className="inp" placeholder="e.g. Sheet S-104, RFI-0042" value={iDocs} onChange={e => setIDocs(e.target.value)}/>
                      </div>
                      <div><FL>Contractor / Sub</FL><input className="inp" name="contractor" required placeholder="e.g. Apex Steel Corp" value={iContr} onChange={e => setIContr(e.target.value)}/></div>
                      <div><FL>{termRev}</FL><input className="inp" type="number" name="revision" required min="0" value={iRev} onChange={e => setIRev(Number(e.target.value))}/></div>
                      <div><FL>Review Period (Days)</FL><input className="inp" type="number" name="slaDays" required min="1" value={iSla} onChange={e => setISla(Number(e.target.value))}/></div>
                      <div style={{ gridColumn:'1/-1', paddingTop:4, borderTop:'1px solid #f1f5f9' }}>
                        <div style={{ fontSize:11, fontWeight:700, color:'#64748b', letterSpacing:'.05em', textTransform:'uppercase', marginBottom:10, display:'flex', alignItems:'center', gap:6 }}><ITag size={11}/>Metadata Tags</div>
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                          <div><FL>Components</FL><input className="inp" placeholder="e.g. Abutment 1, Pier 2" value={iComp} onChange={e => setIComp(e.target.value)}/></div>
                          <div><FL>Disciplines</FL><input className="inp" placeholder="e.g. Structural Steel" value={iDisc} onChange={e => setIDisc(e.target.value)}/></div>
                        </div>
                      </div>
                    </div>
                    <div style={{ borderTop:'1px solid #f1f5f9', paddingTop:14 }}>
                      <FL>Incoming PDF Package</FL>
                      <div style={{ marginTop:6, border:'1px dashed #cbd5e1', borderRadius:5, padding:18, textAlign:'center', background:'#f8fafc', cursor:'pointer' }} onClick={() => document.getElementById('intake-file').click()}>
                        <ICloud size={22} style={{ color:'#cbd5e1', margin:'0 auto 8px', display:'block' }}/>
                        <div style={{ fontSize:12, color:'#64748b' }}>{iFile ? <span style={{ color:'#2563eb', fontWeight:600 }}>{iFile.name}</span> : <><span style={{ color:'#2563eb', fontWeight:600 }}>Choose a file</span> or drag &amp; drop</>}</div>
                        <div style={{ fontSize:11, color:'#94a3b8', marginTop:3 }}>PDF up to 50MB</div>
                        <input id="intake-file" type="file" style={{ display:'none' }} accept="application/pdf" onChange={e => setIFile(e.target.files[0])}/>
                      </div>
                    </div>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, paddingTop:4, borderTop:'1px solid #f1f5f9' }}>
                      <div><FL>Initial Assignment</FL><select name="assignedTo" defaultValue={activeUser.name} className="sel">{userOptions.map(n => <option key={n} value={n}>{n}</option>)}</select></div>
                      <div><FL>Ball in Court</FL><select name="ballInCourt" defaultValue="Contractor" className="sel">{BIC_OPTS.map(o => <option key={o} value={o}>{o}</option>)}</select></div>
                    </div>
                    <div style={{ display:'flex', justifyContent:'flex-end', gap:10, paddingTop:8, borderTop:'1px solid #f1f5f9' }}>
                      <button type="button" className="btn-s" onClick={() => setCurrentView('dashboard')} disabled={uploading}>Cancel</button>
                      <button type="submit" className="btn-p" disabled={uploading}>
                        {uploading ? <><ICloud size={13}/>{iFile ? `Uploading ${progress}%…` : 'Saving…'}</> : <><IFPlus size={13}/>Log {termMod}</>}
                      </button>
                    </div>
                  </form>
                )}
              </div>
            </div>
          )}

          {/* ── DETAIL ────────────────────────────────────────────────────── */}
          {currentView === 'detail' && activeRec && (() => {
            const { de, dr, isLate } = getSla(activeRec);
            const bic = activeRec.ballInCourt || '—';
            return (
              <div style={{ display:'grid', gridTemplateColumns:'280px 1fr', gap:18, alignItems:'start' }}>

                {/* Left column */}
                <div style={{ display:'flex', flexDirection:'column', gap:14 }}>

                  {/* Properties */}
                  <div className="card" style={{ overflow:'hidden' }}>
                    <div style={{ padding:'10px 16px', borderBottom:'1px solid #f1f5f9', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                      <span style={{ fontWeight:600, fontSize:13, color:'#0f172a' }}>Properties</span>
                      {!isEditing && <button onClick={() => { setEditForm({ title:activeRec.title, subtitle:activeRec.subtitle||'', contractor:activeRec.contractor, revision:activeRec.revision, slaDays:activeRec.slaDays, relatedDocs:activeRec.relatedDocs||'' }); setIsEditing(true); }} style={{ background:'none', border:'none', cursor:'pointer', color:'#94a3b8', padding:4, borderRadius:4, display:'flex' }}><IEdit size={13}/></button>}
                    </div>
                    {!isEditing ? (
                      <div style={{ padding:'12px 16px', display:'flex', flexDirection:'column', gap:10 }}>
                        {[
                          { label:'Record ID', val: <span style={{ fontFamily:'monospace', fontSize:11 }}>{activeRec.id} · {termRev} {activeRec.revision}</span> },
                          { label:'Logged By', val: activeRec.loggedBy || 'System Legacy' },
                          activeRec.subtitle && { label: termSub, val: activeRec.subtitle },
                          { label:'Project', val: activeRec.projectName },
                          { label:'Contractor', val: activeRec.contractor },
                        ].filter(Boolean).map(({ label, val }) => (
                          <div key={label}>
                            <div style={{ fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:2 }}>{label}</div>
                            <div style={{ fontSize:12, fontWeight:500, color:'#334155' }}>{val}</div>
                          </div>
                        ))}
                        {activeRec.relatedDocs && (
                          <div style={{ background:'#eff6ff', border:'1px solid #bfdbfe', borderRadius:5, padding:'8px 10px' }}>
                            <div style={{ fontSize:10, fontWeight:700, color:'#2563eb', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:3, display:'flex', alignItems:'center', gap:4 }}><ILink size={10}/>Plan Sheets / Refs</div>
                            <div style={{ fontSize:12, fontWeight:600, color:'#1e3a8a' }}>{activeRec.relatedDocs}</div>
                          </div>
                        )}
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                          <div>
                            <div style={{ fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:2 }}>Received</div>
                            <div style={{ fontSize:12, fontWeight:500, color:'#334155' }}>{fmtDate(activeRec.dateReceived)}</div>
                          </div>
                          <div>
                            <div style={{ fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:2 }}>SLA</div>
                            <div style={{ fontSize:12, fontWeight:500, color:'#334155' }}>{activeRec.slaDays} days</div>
                          </div>
                        </div>
                        <div>
                          <div style={{ fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:2 }}>Due Date</div>
                          <div style={{ fontSize:12, fontWeight:600, color: isLate ? '#dc2626' : '#334155' }}>{fmtDate(activeRec.dueDate)}</div>
                        </div>
                        <div style={{ background: isLate ? '#fef2f2' : dr <= 3 ? '#fffbeb' : '#f0fdf4', border:`1px solid ${isLate ? '#fecaca' : dr <= 3 ? '#fde68a' : '#bbf7d0'}`, borderRadius:5, padding:'7px 10px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                          <span style={{ fontSize:12, fontWeight:700, color: isLate ? '#dc2626' : dr <= 3 ? '#d97706' : '#16a34a' }}>{isLate ? `${Math.abs(dr)}d overdue` : dr <= 3 ? `${dr}d at risk` : `${dr}d remaining`}</span>
                          <span style={{ fontSize:11, color:'#94a3b8' }}>{de}d elapsed</span>
                        </div>
                      </div>
                    ) : (
                      <form onSubmit={doEditSubmit} style={{ padding:'12px 16px', display:'flex', flexDirection:'column', gap:10 }}>
                        <div><FL>Title</FL><input className="inp" required value={editForm.title} onChange={e => setEditForm({ ...editForm, title:e.target.value })}/></div>
                        <div><FL>{termSub}</FL><input className="inp" value={editForm.subtitle} onChange={e => setEditForm({ ...editForm, subtitle:e.target.value })}/></div>
                        <div><FL>Plan Sheets / Refs</FL><input className="inp" value={editForm.relatedDocs} onChange={e => setEditForm({ ...editForm, relatedDocs:e.target.value })}/></div>
                        <div><FL>Contractor</FL><input className="inp" required value={editForm.contractor} onChange={e => setEditForm({ ...editForm, contractor:e.target.value })}/></div>
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                          <div><FL>{termRev}</FL><input className="inp" type="number" required min="0" value={editForm.revision} onChange={e => setEditForm({ ...editForm, revision:e.target.value })}/></div>
                          <div><FL>SLA (Days)</FL><input className="inp" type="number" required min="1" value={editForm.slaDays} onChange={e => setEditForm({ ...editForm, slaDays:e.target.value })}/></div>
                        </div>
                        <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
                          <button type="button" className="btn-s" style={{ fontSize:12 }} onClick={() => setIsEditing(false)}>Cancel</button>
                          <button type="submit" className="btn-p" style={{ fontSize:12 }}>Save</button>
                        </div>
                      </form>
                    )}
                  </div>

                  {/* Attachments */}
                  <div className="card" style={{ padding:'12px 16px' }}>
                    <div style={{ fontWeight:600, fontSize:13, color:'#0f172a', marginBottom:10, paddingBottom:8, borderBottom:'1px solid #f1f5f9' }}>Attachments</div>
                    <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
                      {activeRec.incomingPdfRef ? (
                        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'7px 10px', background:'#f8fafc', border:'1px solid #e2e8f0', borderRadius:5 }}>
                          <div style={{ display:'flex', alignItems:'center', gap:7, overflow:'hidden' }}><IFT size={14} style={{ color:'#3b82f6', flexShrink:0 }}/><span style={{ fontSize:12, color:'#334155', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontWeight:500 }}>{activeRec.incomingFileName || 'Incoming Package'}</span></div>
                          <a href={activeRec.incomingPdfRef} target="_blank" rel="noreferrer" style={{ color:'#2563eb', display:'flex', flexShrink:0 }}><IDl size={14}/></a>
                        </div>
                      ) : <p style={{ fontSize:12, color:'#94a3b8', fontStyle:'italic', margin:0 }}>No incoming file.</p>}
                      {activeRec.outgoingPdfRef && (
                        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'7px 10px', background:'#f0fdf4', border:'1px solid #bbf7d0', borderRadius:5 }}>
                          <div style={{ display:'flex', alignItems:'center', gap:7, overflow:'hidden' }}><ICheck size={14} style={{ color:'#16a34a', flexShrink:0 }}/><span style={{ fontSize:12, color:'#166534', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontWeight:500 }}>{activeRec.outgoingFileName || 'Marked Up Final'}</span></div>
                          <a href={activeRec.outgoingPdfRef} target="_blank" rel="noreferrer" style={{ color:'#16a34a', display:'flex', flexShrink:0 }}><IDl size={14}/></a>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Comments */}
                  <div className="card" style={{ display:'flex', flexDirection:'column', height:300 }}>
                    <div style={{ padding:'10px 16px', borderBottom:'1px solid #f1f5f9', display:'flex', alignItems:'center', gap:8 }}>
                      <IMsg size={13} style={{ color:'#94a3b8' }}/>
                      <span style={{ fontWeight:600, fontSize:13, color:'#0f172a' }}>Discussion</span>
                      <span style={{ marginLeft:'auto', fontSize:11, color:'#94a3b8' }}>{activeRec.comments?.length || 0} notes</span>
                    </div>
                    <div style={{ flex:1, overflowY:'auto', padding:'10px 14px', display:'flex', flexDirection:'column', gap:8 }}>
                      {(!activeRec.comments || activeRec.comments.length === 0) ?
                        <p style={{ fontSize:12, color:'#94a3b8', textAlign:'center', fontStyle:'italic', marginTop:16 }}>No comments yet.</p> :
                        activeRec.comments.map(c => (
                          <div key={c.id} style={{ background:'#f8fafc', borderRadius:5, padding:'8px 10px', border:'1px solid #f1f5f9' }}>
                            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:3 }}>
                              <span style={{ fontSize:11, fontWeight:700, color:'#334155' }}>{c.user}</span>
                              <span style={{ fontSize:10, color:'#94a3b8' }}>{fmtDate(c.timestamp)} {fmtTime(c.timestamp)}</span>
                            </div>
                            <p style={{ fontSize:12, color:'#475569', whiteSpace:'pre-wrap', lineHeight:1.5, margin:0 }}>{c.text}</p>
                          </div>
                        ))
                      }
                    </div>
                    <form onSubmit={addComment} style={{ padding:'8px 12px', borderTop:'1px solid #f1f5f9', position:'relative' }}>
                      <textarea className="inp" rows="2" placeholder="Add a note… (Enter to send)" value={newComment} onChange={e => setNewComment(e.target.value)} style={{ resize:'none', paddingRight:36, fontSize:12 }}
                        onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addComment(e); } }}></textarea>
                      <button type="submit" disabled={!newComment.trim()} style={{ position:'absolute', right:16, bottom:16, background:'none', border:'none', cursor:'pointer', color:'#2563eb', opacity: newComment.trim() ? 1 : .3, display:'flex' }}><ISend size={14}/></button>
                    </form>
                  </div>
                </div>

                {/* Right column */}
                <div style={{ display:'flex', flexDirection:'column', gap:14 }}>

                  {/* Routing card */}
                  <div className="card" style={{ padding:'16px 20px' }}>
                    <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:16, paddingBottom:14, borderBottom:'1px solid #f1f5f9' }}>
                      <div>
                        <div style={{ fontSize:17, fontWeight:700, color:'#0f172a', letterSpacing:'-.01em' }}>{activeRec.title}</div>
                        <div style={{ fontSize:12, color:'#64748b', marginTop:3 }}>{activeRec.projectName} · {activeRec.contractor}</div>
                      </div>
                      <span style={{ fontSize:12, fontWeight:700, padding:'4px 12px', borderRadius:4, border:'1px solid', flexShrink:0, marginLeft:12,
                        ...( (activeRec.externalStatus||'').includes('Approved') || activeRec.externalStatus==='Answered' || activeRec.externalStatus==='Closed' ? { background:'#f0fdf4', borderColor:'#bbf7d0', color:'#166534' } :
                             (activeRec.externalStatus||'').includes('Pending') ? { background:'#fffbeb', borderColor:'#fde68a', color:'#92400e' } :
                             { background:'#fef2f2', borderColor:'#fecaca', color:'#991b1b' } )
                      }}>
                        {activeRec.externalStatus || 'Pending'}
                      </span>
                    </div>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>
                      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                        <div style={{ fontSize:11, fontWeight:700, color:'#64748b', letterSpacing:'.05em', textTransform:'uppercase', display:'flex', alignItems:'center', gap:6 }}><IUsers size={11}/>Internal Routing</div>
                        <div><FL>Assigned Engineer</FL><select className="sel" value={assignedIn} onChange={e => { setAssignedIn(e.target.value); updateStatus(activeRec.id, { assignedTo: e.target.value || 'Unassigned' }); }}>{userOptions.map(n => <option key={n} value={n}>{n}</option>)}</select></div>
                        <div><FL>QC Reviewer</FL><select className="sel" value={qcIn} onChange={e => { setQcIn(e.target.value); updateStatus(activeRec.id, { qcReviewer: e.target.value }); }}><option value="">— None —</option>{userOptions.filter(n => n !== 'Unassigned').map(n => <option key={n} value={n}>{n}</option>)}</select></div>
                        <div><FL>Internal Status</FL><select className="sel" value={activeRec.internalStatus || 'Unassigned'} onChange={e => updateStatus(activeRec.id, { internalStatus: e.target.value })}>{INT_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                        <div><FL>Ball in Court</FL><select className="sel" style={{ fontWeight:600, ...BIC_STYLE[bic] }} value={bic} onChange={e => updateStatus(activeRec.id, { ballInCourt: e.target.value })}>{BIC_OPTS.map(o => <option key={o} value={o}>{o}</option>)}</select></div>
                      </div>
                      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                        <div style={{ fontSize:11, fontWeight:700, color:'#64748b', letterSpacing:'.05em', textTransform:'uppercase', display:'flex', alignItems:'center', gap:6 }}><ICheck size={11}/>Engineering Decision</div>
                        <div>
                          <FL>Official {termMod} Status</FL>
                          <select className="sel" style={{ fontWeight:600, color:'#92400e', borderColor:'#fde68a', background:'#fffbeb' }} value={activeRec.externalStatus || 'Pending'} onChange={e => updateStatus(activeRec.id, { externalStatus: e.target.value })}>
                            {EXT_STATUSES[activeModule].map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                        </div>
                        <div>
                          <FL>Upload Redlined Response</FL>
                          <div style={{ display:'flex', gap:8, alignItems:'center', marginTop:2 }}>
                            <input type="file" accept="application/pdf" onChange={e => setOutFile(e.target.files[0])} style={{ fontSize:11, color:'#475569', flex:1, minWidth:0 }}/>
                            <button onClick={doOutgoing} disabled={!outFile || uploading} className="btn-s" style={{ fontSize:11, whiteSpace:'nowrap', padding:'5px 10px' }}>
                              {uploading ? `${progress}%…` : 'Upload'}
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Audit history */}
                  <div className="card" style={{ overflow:'hidden' }}>
                    <div style={{ padding:'10px 16px', borderBottom:'1px solid #f1f5f9', display:'flex', alignItems:'center', gap:8 }}>
                      <IHist size={13} style={{ color:'#94a3b8' }}/>
                      <span style={{ fontWeight:600, fontSize:13, color:'#0f172a' }}>Audit History</span>
                      <span style={{ marginLeft:'auto', fontSize:11, color:'#94a3b8' }}>{(activeRec.history || []).length} events</span>
                    </div>
                    {(!activeRec.history || activeRec.history.length === 0) ? (
                      <div style={{ padding:'20px 16px', fontSize:12, color:'#94a3b8', textAlign:'center', fontStyle:'italic' }}>No history recorded.</div>
                    ) : (
                      <div style={{ maxHeight:280, overflowY:'auto' }}>
                        {[...(activeRec.history || [])].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).map((h, i, arr) => (
                          <div key={i} style={{ display:'flex', gap:12, padding:'10px 16px', borderBottom: i < arr.length - 1 ? '1px solid #f8fafc' : 'none' }}>
                            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', flexShrink:0 }}>
                              <div style={{ width:8, height:8, borderRadius:'50%', background:'#3b82f6', marginTop:3, flexShrink:0 }}></div>
                              {i < arr.length - 1 && <div style={{ width:1, flex:1, background:'#f1f5f9', marginTop:3 }}></div>}
                            </div>
                            <div style={{ flex:1, minWidth:0, paddingBottom:2 }}>
                              <div style={{ fontSize:12, fontWeight:600, color:'#334155' }}>{h.action}</div>
                              <div style={{ fontSize:11, color:'#94a3b8', marginTop:2 }}>{h.user} · {fmtDate(h.timestamp)} {fmtTime(h.timestamp)}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ── ANALYTICS ─────────────────────────────────────────────────── */}
          {currentView === 'analytics' && (() => {
            const active   = records.filter(s => s.internalStatus !== 'Sent Out');
            const overdue  = active.filter(s => getSla(s).isLate);
            const avgAge   = active.length > 0 ? Math.round(active.reduce((a, s) => a + getSla(s).de, 0) / active.length) : 0;
            const pct      = active.length > 0 ? Math.round(overdue.length / active.length * 100) : 0;
            const wMap = {}; active.forEach(s => { const a = s.assignedTo || 'Unassigned'; wMap[a] = (wMap[a] || 0) + 1; });
            const workload = Object.entries(wMap).map(([n, c]) => ({ name:n, count:c })).sort((a, b) => b.count - a.count);
            const bicMap = {}; active.forEach(s => { const b = s.ballInCourt || '—'; bicMap[b] = (bicMap[b] || 0) + 1; });
            const kpis = [
              { label:'Total Active', val: active.length, sub:'excluding Sent Out' },
              { label:'Overdue', val: overdue.length, sub:'past SLA deadline', alert: overdue.length > 0 },
              { label:'Avg Age (Days)', val: avgAge, sub:'across active items' },
              { label:'SLA Breach Rate', val: `${pct}%`, sub:'of total active' },
            ];
            return (
              <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14 }}>
                  {kpis.map(k => (
                    <div key={k.label} className="card" style={{ padding:'16px 18px', borderLeft:`3px solid ${k.alert ? '#ef4444' : '#e2e8f0'}` }}>
                      <div style={{ fontSize:11, fontWeight:700, color:'#64748b', letterSpacing:'.06em', textTransform:'uppercase', marginBottom:8 }}>{k.label}</div>
                      <div style={{ fontSize:30, fontWeight:800, color: k.alert ? '#dc2626' : '#0f172a', letterSpacing:'-.02em', lineHeight:1 }}>{k.val}</div>
                      <div style={{ fontSize:11, color:'#94a3b8', marginTop:6 }}>{k.sub}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
                  <div className="card" style={{ overflow:'hidden' }}>
                    <div style={{ padding:'10px 16px', borderBottom:'1px solid #f1f5f9', fontSize:12, fontWeight:700, color:'#0f172a' }}>Engineer Workload</div>
                    <div style={{ padding:'14px 16px', display:'flex', flexDirection:'column', gap:12 }}>
                      {workload.length === 0 ? <p style={{ fontSize:12, color:'#94a3b8', fontStyle:'italic', margin:0 }}>No assignments.</p> :
                        workload.map(u => {
                          const max = Math.max(...workload.map(w => w.count), 1);
                          return (
                            <div key={u.name}>
                              <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:5 }}>
                                <span style={{ fontWeight:500, color:'#334155' }}>{u.name}</span>
                                <span style={{ fontWeight:700, color:'#0f172a' }}>{u.count}</span>
                              </div>
                              <div style={{ background:'#f1f5f9', borderRadius:3, height:6 }}>
                                <div style={{ background:'#2563eb', height:6, borderRadius:3, width:`${u.count / max * 100}%`, transition:'width .4s' }}></div>
                              </div>
                            </div>
                          );
                        })
                      }
                    </div>
                  </div>
                  <div className="card" style={{ overflow:'hidden' }}>
                    <div style={{ padding:'10px 16px', borderBottom:'1px solid #f1f5f9', fontSize:12, fontWeight:700, color:'#0f172a' }}>Ball-in-Court Distribution</div>
                    <div style={{ padding:'14px 16px', display:'flex', flexDirection:'column', gap:12 }}>
                      {Object.entries(bicMap).length === 0 ? <p style={{ fontSize:12, color:'#94a3b8', fontStyle:'italic', margin:0 }}>No data.</p> :
                        Object.entries(bicMap).sort((a, b) => b[1] - a[1]).map(([bic, count]) => {
                          const max = Math.max(...Object.values(bicMap), 1);
                          return (
                            <div key={bic}>
                              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:12, marginBottom:5 }}>
                                <span className="badge" style={BIC_STYLE[bic] || BIC_STYLE['—']}>{bic}</span>
                                <span style={{ fontWeight:700, color:'#0f172a' }}>{count}</span>
                              </div>
                              <div style={{ background:'#f1f5f9', borderRadius:3, height:6 }}>
                                <div style={{ background:'#64748b', height:6, borderRadius:3, width:`${count / max * 100}%`, transition:'width .4s' }}></div>
                              </div>
                            </div>
                          );
                        })
                      }
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

        </div>
      </div>

      {/* Quick comment modal */}
      {quickModal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:999, padding:20 }}>
          <div className="card" style={{ width:'100%', maxWidth:420, overflow:'hidden' }}>
            <div style={{ padding:'12px 16px', borderBottom:'1px solid #f1f5f9', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}><IMsg size={14} style={{ color:'#3b82f6' }}/><span style={{ fontWeight:700, fontSize:13, color:'#0f172a' }}>Quick Comment</span></div>
              <button onClick={() => setQuickModal(null)} style={{ background:'none', border:'none', cursor:'pointer', color:'#94a3b8', display:'flex' }}><IX size={15}/></button>
            </div>
            <div style={{ padding:16 }}>
              <div style={{ background:'#f8fafc', borderRadius:5, padding:'8px 10px', marginBottom:14 }}>
                <div style={{ fontSize:12, fontWeight:600, color:'#334155' }}>{quickModal.title}</div>
                <div style={{ fontSize:11, color:'#94a3b8', marginTop:2, fontFamily:'monospace' }}>{quickModal.id} · {termRev} {quickModal.revision}</div>
              </div>
              <form onSubmit={addQuickComment} style={{ display:'flex', flexDirection:'column', gap:10 }}>
                <textarea autoFocus className="inp" rows="4" placeholder="Type your note…" value={quickText} onChange={e => setQuickText(e.target.value)} style={{ resize:'none', fontSize:13 }}></textarea>
                <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
                  <button type="button" className="btn-s" style={{ fontSize:12 }} onClick={() => setQuickModal(null)}>Cancel</button>
                  <button type="submit" disabled={!quickText.trim()} className="btn-p" style={{ fontSize:12 }}>Save Note</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      )}

      <Toast toast={toast} dismiss={() => setToast(null)}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
