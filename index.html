                        <input type="file" accept="application/pdf" onChange={e=>setOutgoingFile(e.target.files[0])} className="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
                        <button onClick={handleUploadOutgoingFile} disabled={!outgoingFile||isUploading} className="px-3 py-1.5 bg-slate-800 text-white rounded text-xs font-medium hover:bg-slate-900 disabled:opacity-50">{isUploading?`Uploading (${uploadProgress}%)...`:'Upload'}</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              {/* ── NEW: History Log card ── */}
              <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
                <div className="flex items-center gap-2 mb-4 border-b border-slate-100 pb-2">
                  <HistoryIcon className="w-4 h-4 text-slate-500"/>
                  <h3 className="font-bold text-slate-900">Audit History</h3>
                  <span className="ml-auto text-xs text-slate-400 font-medium">{(activeRecordItem.history||[]).length} events</span>
                </div>
                {(!activeRecordItem.history||activeRecordItem.history.length===0)?(
                  <p className="text-sm text-slate-400 italic text-center py-4">No history recorded yet.</p>
                ):(
                  <div className="space-y-0 max-h-72 overflow-y-auto pr-1">
                    {[...(activeRecordItem.history||[])].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map((h,i)=>(
                      <div key={i} className="flex gap-3 py-3 border-b border-slate-50 last:border-0">
                        <div className="flex flex-col items-center">
                          <div className="w-2 h-2 rounded-full bg-blue-400 mt-1.5 flex-shrink-0"></div>
                          {i<(activeRecordItem.history.length-1)&&<div className="w-px flex-1 bg-slate-200 mt-1"></div>}
                        </div>
                        <div className="pb-1 flex-1 min-w-0">
                          <p className="text-sm font-medium text-slate-800">{h.action}</p>
                          <div className="flex items-center gap-2 mt-0.5">
                            <span className="text-xs text-slate-500">{h.user}</span>
                            <span className="text-slate-300 text-xs">•</span>
                            <span className="text-xs text-slate-400">{new Date(h.timestamp).toLocaleDateString()} {new Date(h.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* ── ANALYTICS ── */}
        {currentView==='analytics'&&(()=>{
          const active=activeRecords.filter(s=>s.internalStatus!=='Sent Out');
          const overdue=active.filter(s=>Math.floor((Date.now()-new Date(s.dateReceived).getTime())/86400000)>(s.slaDays||14));
          const avgAge=active.length>0?Math.round(active.reduce((acc,s)=>acc+Math.floor((Date.now()-new Date(s.dateReceived).getTime())/86400000),0)/active.length):0;
          const pct=active.length>0?Math.round(overdue.length/active.length*100):0;
          const wMap={};active.forEach(s=>{const a=s.assignedTo||'Unassigned';wMap[a]=(wMap[a]||0)+1;});
          const workload=Object.entries(wMap).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
          const bicMap={};active.forEach(s=>{const b=s.ballInCourt||'—';bicMap[b]=(bicMap[b]||0)+1;});
          return(
            <div className="space-y-6">
              <div className="flex items-center gap-3 border-b border-slate-200 pb-4"><div className="bg-slate-800 p-2 rounded-lg"><BarChart2 className="w-6 h-6 text-white"/></div><div><h2 className="text-2xl font-bold text-slate-900">Project Manager Analytics</h2><p className="text-sm text-slate-500">KPIs across active <span className="font-bold text-blue-600">{activeModule}</span>.</p></div></div>
              <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm"><p className="text-sm font-medium text-slate-500 mb-1">Total Active</p><p className="text-3xl font-bold text-slate-900">{active.length}</p></div>
                <div className="bg-red-50 border border-red-200 rounded-xl p-6 shadow-sm"><p className="text-sm font-medium text-red-600 mb-1">Overdue</p><p className="text-3xl font-bold text-red-700">{overdue.length}</p></div>
                <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm"><p className="text-sm font-medium text-slate-500 mb-1">Avg Aging (Days)</p><p className="text-3xl font-bold text-slate-900">{avgAge}</p></div>
                <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm"><p className="text-sm font-medium text-slate-500 mb-1">% Exceeding SLA</p><p className="text-3xl font-bold text-slate-900">{pct}%</p></div>
              </div>
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden"><div className="px-6 py-4 border-b border-slate-100 bg-slate-50"><h3 className="font-bold text-slate-800">Engineer Workload Distribution</h3></div><div className="p-6 space-y-4">{workload.length===0?<p className="text-sm text-slate-500 italic">No active assignments.</p>:workload.map(u=>{const max=Math.max(...workload.map(w=>w.count),1);return(<div key={u.name}><div className="flex justify-between text-sm mb-1"><span className="font-medium text-slate-700">{u.name}</span><span className="font-bold text-slate-900">{u.count} items</span></div><div className="w-full bg-slate-100 rounded-full h-2.5"><div className="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style={{width:`${u.count/max*100}%`}}></div></div></div>);})}</div></div>
                {/* ── NEW: BIC breakdown in analytics ── */}
                <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden"><div className="px-6 py-4 border-b border-slate-100 bg-slate-50"><h3 className="font-bold text-slate-800">Ball-in-Court Breakdown</h3></div><div className="p-6 space-y-3">{Object.entries(bicMap).length===0?<p className="text-sm text-slate-500 italic">No data.</p>:Object.entries(bicMap).sort((a,b)=>b[1]-a[1]).map(([bic,count])=>{const max=Math.max(...Object.values(bicMap),1);return(<div key={bic}><div className="flex justify-between text-sm mb-1"><span className={`inline-flex items-center px-2 py-0.5 rounded text-xs font-bold border ${BIC_COLORS[bic]||BIC_COLORS['—']}`}>{bic}</span><span className="font-bold text-slate-900">{count} items</span></div><div className="w-full bg-slate-100 rounded-full h-2.5"><div className="h-2.5 rounded-full transition-all duration-500 bg-slate-500" style={{width:`${count/max*100}%`}}></div></div></div>);})}</div></div>
              </div>
            </div>
          );
        })()}

      </main>

      {/* Quick Comment Modal */}
      {quickCommentModal&&(
        <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
            <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50"><h3 className="font-bold text-slate-900 flex items-center gap-2"><MessageSquare className="w-4 h-4 text-blue-600"/>Quick Comment</h3><button onClick={()=>setQuickCommentModal(null)}><X className="w-5 h-5 text-slate-400 hover:text-slate-600"/></button></div>
            <div className="p-6">
              <div className="mb-4"><p className="text-xs text-slate-500 uppercase tracking-wider mb-1">{termModule}</p><p className="font-medium text-slate-900">{quickCommentModal.title}</p><p className="text-xs text-slate-500">ID: {quickCommentModal.id} • {termRev} {quickCommentModal.revision}</p></div>
              <form onSubmit={handleQuickCommentSubmit}>
                <label className="block text-sm font-medium text-slate-700 mb-2">Your Note</label>
                <textarea autoFocus className="w-full border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none" rows="4" placeholder="Type your comment here..." value={quickCommentText} onChange={e=>setQuickCommentText(e.target.value)}></textarea>
                <div className="flex justify-end gap-3 mt-6"><button type="button" onClick={()=>setQuickCommentModal(null)} className="px-4 py-2 border border-slate-300 rounded-md text-sm font-medium text-slate-700 hover:bg-slate-50">Cancel</button><button type="submit" disabled={!quickCommentText.trim()} className="px-4 py-2 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 disabled:opacity-50">Save Comment</button></div>
              </form>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast&&(
        <div className="fixed bottom-4 right-4 z-50">
          <div className={`flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border ${toast.type==='error'?'bg-red-50 border-red-200 text-red-800':'bg-emerald-50 border-emerald-200 text-emerald-800'}`}>
            {toast.type==='error'?<AlertCircle className="w-5 h-5"/>:<CheckCircle className="w-5 h-5"/>}
            <p className="text-sm font-medium">{toast.message}</p>
            <button onClick={()=>setToast(null)}><X className="w-4 h-4 text-slate-400"/></button>
          </div>
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
