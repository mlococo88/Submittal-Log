                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead><tr><th className="th">Name / Role</th><th className="th">Email</th><th className="th" style={{width:80,textAlign:'right'}}>Actions</th></tr></thead>
                  <tbody>{teamMembers.length===0?<tr><td className="td" colSpan="3" style={{textAlign:'center',color:'#94a3b8',fontStyle:'italic'}}>No team members configured.</td></tr>:teamMembers.map(m=><tr key={m.id}><td className="td"><div style={{fontWeight:600,color:'#0f172a'}}>{m.name}</div><div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{m.role}</div></td><td className="td" style={{fontSize:12,color:'#475569'}}>{m.email}</td><td className="td" style={{textAlign:'right'}}><div style={{display:'flex',justifyContent:'flex-end',gap:4}}><button onClick={()=>{setTeamForm({id:m.id,name:m.name,email:m.email,role:m.role});setEditingTeam(true);}} style={{background:'none',border:'none',cursor:'pointer',color:'#64748b',padding:4,borderRadius:4}}><IEdit s={13}/></button><button onClick={()=>{if(window.confirm(`Remove "${m.name}"?`))delTeam(m.id);}} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',padding:4,borderRadius:4}}><ITrash s={13}/></button></div></td></tr>)}</tbody>
                </table>
              </div>
            </div>
          )}

          {/* ── DASHBOARD ────────────────────────────────────────────────── */}
          {currentView==='dashboard'&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>

              {/* SLA strip */}
              <div className="card" style={{padding:'10px 16px',display:'flex',alignItems:'center',gap:0,overflow:'hidden'}}>
                <span style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.05em',textTransform:'uppercase',marginRight:20,whiteSpace:'nowrap'}}>SLA Status</span>
                {[{k:'on-track',label:'On Track',count:slaCounts.onTrack,color:'#16a34a',bg:'#f0fdf4',border:'#bbf7d0'},{k:'at-risk',label:'At Risk',count:slaCounts.atRisk,color:'#d97706',bg:'#fffbeb',border:'#fde68a'},{k:'overdue',label:'Overdue',count:slaCounts.overdue,color:'#dc2626',bg:'#fef2f2',border:'#fecaca'}].map(({k,label,count,color,bg,border})=>(
                  <button key={k} onClick={()=>setFilterSla(filterSla===k?'':k)} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 16px',borderRadius:4,border:`1px solid ${filterSla===k?color:border}`,background:filterSla===k?bg:'transparent',cursor:'pointer',marginRight:8,transition:'all .15s'}}>
                    <span style={{width:8,height:8,borderRadius:'50%',background:color,display:'block'}}></span>
                    <span style={{fontSize:13,fontWeight:700,color}}>{count}</span>
                    <span style={{fontSize:12,color:'#475569',fontWeight:500}}>{label}</span>
                  </button>
                ))}
                <div style={{marginLeft:'auto',fontSize:12,color:'#94a3b8'}}>{activeRecords.filter(s=>s.internalStatus!=='Sent Out').length} active {isRfi?'RFIs':'submittals'}</div>
              </div>

              {/* Filter panel */}
              {showFilters&&(
                <div className="card" style={{padding:'12px 16px'}}>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,alignItems:'end'}}>
                    <div><FL>Project</FL><select className="sel" value={filterProject} onChange={e=>setFilterProject(e.target.value)}><option value="">All Projects</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
                    <div><FL>Internal Status</FL><select className="sel" value={filterIntStatus} onChange={e=>setFilterIntStatus(e.target.value)}><option value="">All</option>{INT_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                    <div><FL>Official Status</FL><select className="sel" value={filterExtStatus} onChange={e=>setFilterExtStatus(e.target.value)}><option value="">All</option>{EXT_STATUSES[activeModule].map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                    <div><FL>Assignee</FL><select className="sel" value={filterAssignee} onChange={e=>setFilterAssignee(e.target.value)}><option value="">All</option>{userOptions.map(n=><option key={n} value={n}>{n}</option>)}</select></div>
                    <div style={{display:'flex',alignItems:'flex-end'}}>{activeFC>0&&<button onClick={()=>{setFilterProject('');setFilterIntStatus('');setFilterExtStatus('');setFilterAssignee('');setFilterSla('');}} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',fontSize:12,fontWeight:500,display:'flex',alignItems:'center',gap:4,padding:'7px 0'}}><IX s={13}/>Clear filters</button>}</div>
                  </div>
                </div>
              )}

              {/* Tabs */}
              <div style={{display:'flex',borderBottom:'1px solid #e2e8f0'}}>
                {[{k:'my-queue',label:`My Queue (${activeRecords.filter(s=>s.assignedTo===activeUser.name&&s.internalStatus!=='Sent Out').length})`},{k:'all',label:`All Active ${isRfi?'RFIs':'Submittals'}`}].map(({k,label})=>(
                  <button key={k} onClick={()=>setDashboardTab(k)} style={{padding:'8px 16px',fontSize:13,fontWeight:600,color:dashboardTab===k?'#2563eb':'#64748b',border:'none',background:'none',borderBottom:`2px solid ${dashboardTab===k?'#2563eb':'transparent'}`,cursor:'pointer',marginBottom:-1}}>
                    {label}
                  </button>
                ))}
              </div>

              {/* Table */}
              <div className="card" style={{overflow:'hidden'}}>
                {loadingData?<div style={{padding:40,textAlign:'center',color:'#94a3b8',fontSize:13}}>Loading {activeModule}…</div>:filteredRecs.length===0?(
                  <div style={{padding:48,textAlign:'center'}}>
                    <ICheck s={28} c="text-slate-300" style={{margin:'0 auto 10px'}}/>
                    <div style={{fontSize:14,fontWeight:600,color:'#334155'}}>No items match the current filters</div>
                    <div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>Try adjusting your search or filter criteria</div>
                  </div>
                ):(
                  <div style={{overflowX:'auto'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',minWidth:860}}>
                      <thead>
                        <tr>
                          <th className={`th sortable`} style={{minWidth:260}} onClick={()=>handleSort('title')}>
                            <span style={{display:'inline-flex',alignItems:'center',gap:4}}>{termMod} {sortField==='title'?(sortDir==='asc'?<IArrUp s={11}/>:<IArrDn s={11}/>):<span style={{color:'#cbd5e1',fontSize:10}}>↕</span>}</span>
                          </th>
                          <th className="th" style={{minWidth:120}}>Project</th>
                          <th className={`th sortable`} style={{minWidth:140}} onClick={()=>handleSort('dueDate')}>
                            <span style={{display:'inline-flex',alignItems:'center',gap:4}}>Timeline {sortField==='dueDate'?(sortDir==='asc'?<IArrUp s={11}/>:<IArrDn s={11}/>):<span style={{color:'#cbd5e1',fontSize:10}}>↕</span>}</span>
                          </th>
                          <th className="th" style={{minWidth:140}}>Routing / BIC</th>
                          <th className={`th sortable`} style={{minWidth:100}} onClick={()=>handleSort('dateReceived')}>
                            <span style={{display:'inline-flex',alignItems:'center',gap:4}}>Aging {sortField==='dateReceived'?(sortDir==='asc'?<IArrUp s={11}/>:<IArrDn s={11}/>):<span style={{color:'#cbd5e1',fontSize:10}}>↕</span>}</span>
                          </th>
                          <th className="th" style={{width:80,textAlign:'right'}}></th>
                        </tr>
                      </thead>
                      <tbody>
                        {treeRecs.map(sub=>{
                          if(sub.isVirtual)return(
                            <tr key={sub.id} style={{background:'#f8fafc',borderTop:'2px solid #e2e8f0'}}>
                              <td className="td" style={{paddingTop:7,paddingBottom:7}}>
                                <div style={{fontWeight:700,color:'#0f172a',fontSize:13}}>{sub.title}</div>
                                <div style={{fontSize:10,color:'#94a3b8',fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',marginTop:1}}>{termMod} Thread · {sub.cnt} record{sub.cnt>1?'s':''}</div>
                              </td>
                              <td className="td" style={{paddingTop:7,paddingBottom:7}}>
                                <div style={{fontSize:12,fontWeight:500,color:'#334155'}}>{sub.projectName}</div>
                                <div style={{fontSize:11,color:'#94a3b8'}}>{sub.contractor}</div>
                              </td>
                              <td colSpan="4" className="td" style={{paddingTop:7,paddingBottom:7}}></td>
                            </tr>
                          );
                          const{de,dr,isLate}=slaState(sub);
                          const bic=sub.ballInCourt||'—';
                          return(
                            <tr key={sub.id} className="group" style={{cursor:'default'}}>
                              <td className="td">
                                <div style={{display:'flex',alignItems:'flex-start',gap:6,paddingLeft:`${sub.indentLevel*18}px`}}>
                                  {sub.indentLevel>0&&<ICR s={13} c="text-slate-300" style={{marginTop:2,flexShrink:0}}/>}
                                  <div>
                                    <div style={{fontWeight:600,color:'#0f172a',fontSize:13,lineHeight:1.3}}>{sub.title}</div>
                                    {sub.subtitle&&<div style={{fontSize:11,color:'#64748b',marginTop:1}}>{sub.subtitle}</div>}
                                    <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4}}>
                                      <span style={{fontSize:10,color:'#94a3b8',fontFamily:'monospace'}}>{sub.id} · {termRev} {sub.revision}</span>
                                      {sub.relatedDocs&&<span style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:10,color:'#3b82f6',background:'#eff6ff',padding:'1px 6px',borderRadius:3}}><ILink s={10}/>{sub.relatedDocs}</span>}
                                    </div>
                                    {(sub.tags?.components?.length>0||sub.tags?.disciplines?.length>0)&&(
                                      <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:5}}>
                                        {sub.tags.components?.map((t,i)=><span key={i} style={{fontSize:10,fontWeight:600,padding:'1px 6px',borderRadius:3,background:'#eef2ff',color:'#4338ca',border:'1px solid #e0e7ff',display:'inline-flex',alignItems:'center',gap:3}}><ITag s={9}/>{t}</span>)}
                                        {sub.tags.disciplines?.map((t,i)=><span key={i} style={{fontSize:10,fontWeight:600,padding:'1px 6px',borderRadius:3,background:'#fffbeb',color:'#92400e',border:'1px solid #fde68a'}}>{t}</span>)}
                                      </div>
                                    )}
                                  </div>
                                </div>
                              </td>
                              <td className="td">
                                <div style={{fontSize:12,fontWeight:500,color:'#1e293b'}}>{sub.projectName}</div>
                                <div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>{sub.contractor}</div>
                              </td>
                              <td className="td">
                                <div style={{fontSize:11,color:'#475569',lineHeight:1.8}}>
                                  <div><span style={{color:'#94a3b8',display:'inline-block',width:56}}>Received</span><span style={{fontWeight:500}}>{fmtDate(sub.dateReceived)}</span></div>
                                  <div><span style={{color:'#94a3b8',display:'inline-block',width:56}}>SLA</span><span style={{fontWeight:500}}>{sub.slaDays}d</span></div>
                                  <div><span style={{color:'#94a3b8',display:'inline-block',width:56}}>Due</span><span style={{fontWeight:600,color:isLate?'#dc2626':'#1e293b'}}>{fmtDate(sub.dueDate)}</span></div>
                                </div>
                              </td>
                              <td className="td">
                                <div style={{display:'flex',flexDirection:'column',gap:4}}>
                                  <span className="badge" style={{alignSelf:'flex-start',...Object.fromEntries(Object.entries(INT_CLS[sub.internalStatus]||{}).map(([k,v])=>[k.replace('bg-','background:').replace('text-','color:').replace('border-','borderColor:'),v]))}} >
                                    <span className={`badge ${INT_CLS[sub.internalStatus]||'bg-slate-100 text-slate-500 border-slate-200'}`}>{sub.internalStatus}</span>
                                  </span>
                                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                                    <div style={{width:18,height:18,borderRadius:'50%',background:'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#475569',flexShrink:0}}>{(sub.assignedTo||'U').charAt(0).toUpperCase()}</div>
                                    <span style={{fontSize:11,color:'#475569',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:100}}>{sub.assignedTo||'Unassigned'}</span>
                                  </div>
                                  <span className={`badge ${BIC_CLS[bic]||BIC_CLS['—']}`} style={{alignSelf:'flex-start'}}><IDot s={9}/>&nbsp;{bic}</span>
                                </div>
                              </td>
                              <td className="td">
                                <div style={{fontSize:12,fontWeight:600,color:isLate?'#dc2626':'#475569',display:'flex',alignItems:'center',gap:4}}><IClock s={13}/>{de}d</div>
                                <div style={{fontSize:11,fontWeight:700,marginTop:2,color:isLate?'#dc2626':dr<=3?'#d97706':'#16a34a'}}>{isLate?`${Math.abs(dr)}d overdue`:`${dr}d left`}</div>
                              </td>
                              <td className="td" style={{textAlign:'right'}}>
                                <div style={{display:'flex',justifyContent:'flex-end',gap:4,opacity:0}} className="row-actions">
                                  <button onClick={()=>setQuickModal(sub)} style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',padding:4,borderRadius:4,display:'flex',alignItems:'center',gap:3}} title="Comment">
                                    <IMsg s={13}/>
                                    {sub.comments?.length>0&&<span style={{fontSize:10,fontWeight:700,background:'#e2e8f0',color:'#475569',padding:'0 4px',borderRadius:8}}>{sub.comments.length}</span>}
                                  </button>
                                  <button onClick={()=>{setActiveRecordItem(sub);setCurrentView('detail');}} style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:4,cursor:'pointer',color:'#1d4ed8',fontSize:12,fontWeight:600,padding:'3px 10px'}}>Open</button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                    <style>{`tr:hover .row-actions{opacity:1!important;}`}</style>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ── INTAKE ───────────────────────────────────────────────────── */}
          {currentView==='intake'&&(
            <div style={{maxWidth:640,margin:'0 auto'}}>
              <div className="card" style={{overflow:'hidden'}}>
                <div style={{padding:'16px 20px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',gap:10}}>
                  <div style={{background:'#eff6ff',borderRadius:6,padding:7,display:'flex'}}><IFilePlus s={16} c="text-blue-600"/></div>
                  <div><div style={{fontWeight:600,fontSize:14,color:'#0f172a'}}>Ingest {termMod}</div><div style={{fontSize:12,color:'#64748b'}}>Log an incoming {activeModule.slice(0,-1)} package from a contractor.</div></div>
                </div>
                {projects.length===0?(
                  <div style={{padding:32,textAlign:'center',border:'2px dashed #fde68a',margin:20,borderRadius:8,background:'#fffbeb'}}>
                    <IAlert s={24} c="text-amber-500" style={{margin:'0 auto 10px'}}/>
                    <div style={{fontWeight:600,color:'#92400e',marginBottom:6}}>Configuration Required</div>
                    <div style={{fontSize:12,color:'#78350f',marginBottom:14}}>Create at least one project before logging records.</div>
                    <button className="btn-primary" style={{fontSize:12}} onClick={()=>setCurrentView('projects')}>Go to Projects</button>
                  </div>
                ):(
                  <form onSubmit={doIntake} style={{padding:20,display:'flex',flexDirection:'column',gap:16}}>
                    <div style={{display:'flex',gap:0,background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:5,overflow:'hidden',width:'fit-content'}}>
                      {['new','revision'].map(t=><button key={t} type="button" onClick={()=>{setIType(t);if(t==='new'){setIBase('');setITitle('');setIContractor('');setIRev(0);}}} style={{padding:'6px 16px',fontSize:12,fontWeight:600,background:iType===t?'#fff':'transparent',color:iType===t?'#1d4ed8':'#64748b',border:'none',cursor:'pointer',borderRight:t==='new'?'1px solid #e2e8f0':'none',boxShadow:iType===t?'0 1px 3px rgba(0,0,0,.1)':'none',transition:'all .15s'}}>{t==='new'?`New ${termMod}`:'Revision to Existing'}</button>)}
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                      <div style={{gridColumn:'1/-1'}}><FL>Project</FL><select className="sel" required value={iProject} onChange={e=>{setIProject(e.target.value);setIBase('');}}><option value="">Select a project…</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
                      {iType==='revision'&&<div style={{gridColumn:'1/-1'}}><FL>Base {termMod}</FL><select className="sel" required value={iBase} onChange={e=>setIBase(e.target.value)} disabled={!iProject}><option value="">{iProject?`Select a ${termMod}…`:'Select a project first…'}</option>{activeRecords.filter(s=>s.projectId===iProject).map(s=><option key={s.id} value={s.id}>{s.id} – {termRev} {s.revision}: {s.title}</option>)}</select></div>}
                      <div style={{gridColumn:'1/-1'}}><FL>{isRfi?'RFI Question / Title':'Submittal Title'}</FL><input className="inp" name="title" required placeholder={isRfi?'e.g. Discrepancy at Pier 2':'e.g. Abutment 1 Concrete Mix Design'} value={iTitle} onChange={e=>setITitle(e.target.value)}/></div>
                      <div style={{gridColumn:'1/-1'}}><FL>{termSub}</FL><input className="inp" name="subtitle" placeholder={isRfi?'e.g. Contractor proposes field welding.':'e.g. Spec Section 550'} value={iSub} onChange={e=>setISub(e.target.value)}/></div>
                      <div style={{gridColumn:'1/-1',paddingTop:4,borderTop:'1px solid #f1f5f9'}}><FL><ILink s={10} style={{display:'inline'}}/> Plan Sheets & Related Docs</FL><input className="inp" placeholder="e.g. Sheet S-104, RFI-0042" value={iDocs} onChange={e=>setIDocs(e.target.value)}/></div>
                      <div><FL>Contractor / Sub</FL><input className="inp" name="contractor" required placeholder="e.g. Apex Steel Corp" value={iContractor} onChange={e=>setIContractor(e.target.value)}/></div>
                      <div><FL>{termRev}</FL><input className="inp" type="number" name="revision" required min="0" value={iRev} onChange={e=>setIRev(Number(e.target.value))}/></div>
                      <div><FL>Review Period (Days)</FL><input className="inp" type="number" name="slaDays" required min="1" value={iSla} onChange={e=>setISla(Number(e.target.value))}/></div>
                      <div style={{gridColumn:'1/-1',paddingTop:4,borderTop:'1px solid #f1f5f9'}}>
                        <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.05em',textTransform:'uppercase',marginBottom:10,display:'flex',alignItems:'center',gap:6}}><ITag s={11}/>Metadata Tags</div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                          <div><FL>Components</FL><input className="inp" placeholder="e.g. Abutment 1, Pier 2" value={iComp} onChange={e=>setIComp(e.target.value)}/></div>
                          <div><FL>Disciplines</FL><input className="inp" placeholder="e.g. Structural Steel" value={iDisc} onChange={e=>setIDisc(e.target.value)}/></div>
                        </div>
                      </div>
                    </div>
                    <div style={{borderTop:'1px solid #f1f5f9',paddingTop:16}}>
                      <FL>Upload Incoming PDF Package</FL>
                      <div style={{marginTop:6,border:'1px dashed #cbd5e1',borderRadius:6,padding:'20px',textAlign:'center',background:'#f8fafc',cursor:'pointer'}} onClick={()=>document.getElementById('fileInput').click()}>
                        <ICloud s={22} c="text-slate-300" style={{margin:'0 auto 8px'}}/>
                        <div style={{fontSize:12,color:'#64748b'}}>{iFile?<span style={{color:'#1d4ed8',fontWeight:600}}>{iFile.name}</span>:<><span style={{color:'#2563eb',fontWeight:600,cursor:'pointer'}}>Choose a file</span> or drag & drop</>}</div>
                        <div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>PDF up to 50MB</div>
                        <input id="fileInput" type="file" className="sr-only" accept="application/pdf" onChange={e=>setIFile(e.target.files[0])}/>
                      </div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,paddingTop:4,borderTop:'1px solid #f1f5f9'}}>
                      <div><FL>Initial Assignment</FL><select name="assignedTo" defaultValue={activeUser.name} className="sel">{userOptions.map(n=><option key={n} value={n}>{n}</option>)}</select></div>
                      <div><FL>Ball in Court</FL><select name="ballInCourt" defaultValue="Contractor" className="sel">{BIC_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                    </div>
                    <div style={{display:'flex',justifyContent:'flex-end',gap:10,paddingTop:8,borderTop:'1px solid #f1f5f9'}}>
                      <button type="button" className="btn-secondary" onClick={()=>setCurrentView('dashboard')} disabled={isUploading}>Cancel</button>
                      <button type="submit" className="btn-primary" disabled={isUploading}>
                        {isUploading?<><ICloud s={14} c="animate-bounce"/>{iFile?`Uploading ${uploadProgress}%…`:'Saving…'}</>:<><IFilePlus s={14}/>Log {termMod}</>}
                      </button>
                    </div>
                  </form>
                )}
              </div>
            </div>
          )}

          {/* ── DETAIL ───────────────────────────────────────────────────── */}
          {currentView==='detail'&&activeRecordItem&&(()=>{
            const{de,dr,isLate}=slaState(activeRecordItem);
            return(
              <div style={{display:'grid',gridTemplateColumns:'300px 1fr',gap:20,alignItems:'start'}}>
                {/* Left */}
                <div style={{display:'flex',flexDirection:'column',gap:14}}>

                  {/* Properties */}
                  <div className="card" style={{overflow:'hidden'}}>
                    <div style={{padding:'12px 16px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                      <span style={{fontWeight:600,fontSize:13,color:'#0f172a'}}>Properties</span>
                      <div style={{display:'flex',gap:4}}>
                        {!isEditing&&<button onClick={()=>{setEditForm({title:activeRecordItem.title,subtitle:activeRecordItem.subtitle||'',contractor:activeRecordItem.contractor,revision:activeRecordItem.revision,slaDays:activeRecordItem.slaDays,relatedDocs:activeRecordItem.relatedDocs||''});setIsEditing(true);}} style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',padding:3,borderRadius:3}}><IEdit s={13}/></button>}
                        <button onClick={()=>deleteRecord(activeRecordItem.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',padding:3,borderRadius:3}}><ITrash s={13}/></button>
                      </div>
                    </div>
                    {!isEditing?(
                      <div style={{padding:'14px 16px',fontSize:12}}>
                        <div style={{display:'flex',flexDirection:'column',gap:10}}>
                          <div><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>Record ID</div><div style={{fontWeight:600,color:'#0f172a',fontFamily:'monospace',fontSize:11}}>{activeRecordItem.id} · {termRev} {activeRecordItem.revision}</div></div>
                          <div><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>Logged By</div><div style={{fontWeight:500,color:'#334155'}}>{activeRecordItem.loggedBy||'System Legacy'}</div></div>
                          {activeRecordItem.subtitle&&<div><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>{termSub}</div><div style={{fontWeight:500,color:'#334155'}}>{activeRecordItem.subtitle}</div></div>}
                          {activeRecordItem.relatedDocs&&<div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:5,padding:'8px 10px'}}><div style={{fontSize:10,fontWeight:700,color:'#2563eb',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:3,display:'flex',alignItems:'center',gap:4}}><ILink s={10}/>Plan Sheets / Refs</div><div style={{fontWeight:600,color:'#1e3a8a',fontSize:12}}>{activeRecordItem.relatedDocs}</div></div>}
                          <div><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>Project</div><div style={{fontWeight:500,color:'#334155'}}>{activeRecordItem.projectName}</div></div>
                          <div><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>Contractor</div><div style={{fontWeight:500,color:'#334155'}}>{activeRecordItem.contractor}</div></div>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                            <div><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>Received</div><div style={{fontWeight:500,color:'#334155'}}>{fmtDate(activeRecordItem.dateReceived)}</div></div>
                            <div><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>SLA</div><div style={{fontWeight:500,color:'#334155'}}>{activeRecordItem.slaDays} days</div></div>
                          </div>
                          <div><div style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>Due Date</div><div style={{fontWeight:600,color:isLate?'#dc2626':'#334155'}}>{fmtDate(activeRecordItem.dueDate)}</div></div>
                          <div style={{background:isLate?'#fef2f2':dr<=3?'#fffbeb':'#f0fdf4',border:`1px solid ${isLate?'#fecaca':dr<=3?'#fde68a':'#bbf7d0'}`,borderRadius:5,padding:'7px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <span style={{fontSize:12,fontWeight:600,color:isLate?'#dc2626':dr<=3?'#d97706':'#16a34a'}}>{isLate?`${Math.abs(dr)}d overdue`:dr<=3?`${dr}d at risk`:`${dr}d remaining`}</span>
                            <span style={{fontSize:11,color:'#94a3b8'}}>{de}d elapsed</span>
                          </div>
                        </div>
                      </div>
                    ):(
                      <form onSubmit={doEditSubmit} style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}}>
                        <div><FL>Title</FL><input className="inp" required value={editForm.title} onChange={e=>setEditForm({...editForm,title:e.target.value})}/></div>
                        <div><FL>{termSub}</FL><input className="inp" value={editForm.subtitle} onChange={e=>setEditForm({...editForm,subtitle:e.target.value})}/></div>
                        <div><FL>Plan Sheets / Refs</FL><input className="inp" value={editForm.relatedDocs} onChange={e=>setEditForm({...editForm,relatedDocs:e.target.value})}/></div>
                        <div><FL>Contractor</FL><input className="inp" required value={editForm.contractor} onChange={e=>setEditForm({...editForm,contractor:e.target.value})}/></div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                          <div><FL>{termRev}</FL><input className="inp" type="number" required min="0" value={editForm.revision} onChange={e=>setEditForm({...editForm,revision:e.target.value})}/></div>
                          <div><FL>SLA (Days)</FL><input className="inp" type="number" required min="1" value={editForm.slaDays} onChange={e=>setEditForm({...editForm,slaDays:e.target.value})}/></div>
                        </div>
                        <div style={{display:'flex',justifyContent:'flex-end',gap:8}}><button type="button" className="btn-secondary" style={{fontSize:12}} onClick={()=>setIsEditing(false)}>Cancel</button><button type="submit" className="btn-primary" style={{fontSize:12}}>Save</button></div>
                      </form>
                    )}
                  </div>

                  {/* Cloud Files */}
                  <div className="card" style={{padding:'12px 16px'}}>
                    <div style={{fontWeight:600,fontSize:13,color:'#0f172a',marginBottom:12,paddingBottom:10,borderBottom:'1px solid #f1f5f9'}}>Attachments</div>
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                      {activeRecordItem.incomingPdfRef?(
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:5}}>
                          <div style={{display:'flex',alignItems:'center',gap:7,overflow:'hidden'}}><IFileT s={14} c="text-blue-500"/><span style={{fontSize:12,color:'#334155',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:500}}>{activeRecordItem.incomingFileName||'Incoming Package'}</span></div>
                          <a href={activeRecordItem.incomingPdfRef} target="_blank" rel="noreferrer" style={{color:'#2563eb',display:'flex',flexShrink:0}}><IDown s={14}/></a>
                        </div>
                      ):<p style={{fontSize:12,color:'#94a3b8',fontStyle:'italic'}}>No incoming file.</p>}
                      {activeRecordItem.outgoingPdfRef&&(
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:5}}>
                          <div style={{display:'flex',alignItems:'center',gap:7,overflow:'hidden'}}><ICheck s={14} c="text-emerald-500"/><span style={{fontSize:12,color:'#166534',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:500}}>{activeRecordItem.outgoingFileName||'Marked Up Final'}</span></div>
                          <a href={activeRecordItem.outgoingPdfRef} target="_blank" rel="noreferrer" style={{color:'#16a34a',display:'flex',flexShrink:0}}><IDown s={14}/></a>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Comments */}
                  <div className="card" style={{display:'flex',flexDirection:'column',height:300}}>
                    <div style={{padding:'10px 16px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',gap:8'}}><IMsg s={13} c="text-slate-400"/><span style={{fontWeight:600,fontSize:13,color:'#0f172a'}}>Discussion</span><span style={{marginLeft:'auto',fontSize:11,color:'#94a3b8'}}>{activeRecordItem.comments?.length||0} notes</span></div>
                    <div style={{flex:1,overflowY:'auto',padding:'10px 14px',display:'flex',flexDirection:'column',gap:8}}>
                      {(!activeRecordItem.comments||activeRecordItem.comments.length===0)?<p style={{fontSize:12,color:'#94a3b8',textAlign:'center',fontStyle:'italic',marginTop:16}}>No comments yet.</p>:activeRecordItem.comments.map(c=>(
                        <div key={c.id} style={{background:'#f8fafc',borderRadius:5,padding:'8px 10px',border:'1px solid #f1f5f9'}}>
                          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:11,fontWeight:700,color:'#334155'}}>{c.user}</span><span style={{fontSize:10,color:'#94a3b8'}}>{new Date(c.timestamp).toLocaleDateString()} {new Date(c.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div>
                          <p style={{fontSize:12,color:'#475569',whiteSpace:'pre-wrap',lineHeight:1.5}}>{c.text}</p>
                        </div>
                      ))}
                    </div>
                    <form onSubmit={addComment} style={{padding:'10px 14px',borderTop:'1px solid #f1f5f9',position:'relative'}}>
                      <textarea className="inp" rows="2" placeholder="Add a note… (Enter to send)" value={newComment} onChange={e=>setNewComment(e.target.value)} style={{resize:'none',paddingRight:36,fontSize:12}} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addComment(e);}}}></textarea>
                      <button type="submit" disabled={!newComment.trim()} style={{position:'absolute',right:18,bottom:18,background:'none',border:'none',cursor:'pointer',color:'#2563eb',opacity:newComment.trim()?1:.3}}><ISend s={14}/></button>
                    </form>
                  </div>
                </div>

                {/* Right */}
                <div style={{display:'flex',flexDirection:'column',gap:14}}>

                  {/* Header card */}
                  <div className="card" style={{padding:'16px 20px'}}>
                    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16,paddingBottom:14,borderBottom:'1px solid #f1f5f9'}}>
                      <div>
                        <div style={{fontSize:17,fontWeight:700,color:'#0f172a',letterSpacing:'-.01em'}}>{activeRecordItem.title}</div>
                        <div style={{fontSize:12,color:'#64748b',marginTop:3}}>{activeRecordItem.projectName} · {activeRecordItem.contractor}</div>
                      </div>
                      <span style={{fontSize:12,fontWeight:700,padding:'4px 12px',borderRadius:4,border:'1px solid',...((activeRecordItem.externalStatus||'').includes('Approved')||activeRecordItem.externalStatus==='Answered'||activeRecordItem.externalStatus==='Closed'?{background:'#f0fdf4',borderColor:'#bbf7d0',color:'#166534'}:(activeRecordItem.externalStatus||'').includes('Pending')?{background:'#fffbeb',borderColor:'#fde68a',color:'#92400e'}:{background:'#fef2f2',borderColor:'#fecaca',color:'#991b1b'})}}>
                        {activeRecordItem.externalStatus||'Pending'}
                      </span>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
                      <div style={{display:'flex',flexDirection:'column',gap:12}}>
                        <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.05em',textTransform:'uppercase',marginBottom:2,display:'flex',alignItems:'center',gap:6}}><IUsers s={11}/>Internal Routing</div>
                        <div><FL>Assigned Engineer</FL><select className="sel" value={assignedInput} onChange={e=>{setAssignedInput(e.target.value);updateStatus(activeRecordItem.id,{assignedTo:e.target.value||'Unassigned'});}}>{userOptions.map(n=><option key={n} value={n}>{n}</option>)}</select></div>
                        <div><FL>QC Reviewer</FL><select className="sel" value={qcInput} onChange={e=>{setQcInput(e.target.value);updateStatus(activeRecordItem.id,{qcReviewer:e.target.value});}}><option value="">— None —</option>{userOptions.filter(n=>n!=='Unassigned').map(n=><option key={n} value={n}>{n}</option>)}</select></div>
                        <div><FL>Internal Status</FL><select className="sel" value={activeRecordItem.internalStatus||'Unassigned'} onChange={e=>updateStatus(activeRecordItem.id,{internalStatus:e.target.value})}>{INT_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                        <div><FL>Ball in Court</FL><select className={`sel ${BIC_CLS[activeRecordItem.ballInCourt||'—']}`} style={{fontWeight:600,borderRadius:5}} value={activeRecordItem.ballInCourt||'—'} onChange={e=>updateStatus(activeRecordItem.id,{ballInCourt:e.target.value})}>{BIC_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:12}}>
                        <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.05em',textTransform:'uppercase',marginBottom:2,display:'flex',alignItems:'center',gap:6}}><ICheck s={11}/>Engineering Decision</div>
                        <div><FL>Official {termMod} Status</FL><select className="sel" style={{fontWeight:600,color:'#92400e',borderColor:'#fde68a',background:'#fffbeb'}} value={activeRecordItem.externalStatus||'Pending'} onChange={e=>updateStatus(activeRecordItem.id,{externalStatus:e.target.value})}>{EXT_STATUSES[activeModule].map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                        <div>
                          <FL>Upload Redlined Response</FL>
                          <div style={{display:'flex',gap:8,alignItems:'center'}}>
                            <input type="file" accept="application/pdf" onChange={e=>setOutFile(e.target.files[0])} style={{fontSize:11,color:'#475569'}}/>
                            <button onClick={doOutgoingUpload} disabled={!outFile||isUploading} className="btn-secondary" style={{fontSize:11,whiteSpace:'nowrap',padding:'5px 10px'}}>{isUploading?`${uploadProgress}%…`:'Upload'}</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Audit History */}
                  <div className="card" style={{overflow:'hidden'}}>
                    <div style={{padding:'10px 16px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',gap:8}}>
                      <IHist s={13} c="text-slate-400"/>
                      <span style={{fontWeight:600,fontSize:13,color:'#0f172a'}}>Audit History</span>
                      <span style={{marginLeft:'auto',fontSize:11,color:'#94a3b8'}}>{(activeRecordItem.history||[]).length} events</span>
                    </div>
                    {(!activeRecordItem.history||activeRecordItem.history.length===0)?<div style={{padding:'20px 16px',fontSize:12,color:'#94a3b8',textAlign:'center',fontStyle:'italic'}}>No history recorded.</div>:(
                      <div style={{maxHeight:260,overflowY:'auto'}}>
                        {[...(activeRecordItem.history||[])].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map((h,i,arr)=>(
                          <div key={i} style={{display:'flex',gap:12,padding:'10px 16px',borderBottom:i<arr.length-1?'1px solid #f8fafc':'none'}}>
                            <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                              <div style={{width:8,height:8,borderRadius:'50%',background:'#3b82f6',marginTop:4,flexShrink:0}}></div>
                              {i<arr.length-1&&<div style={{width:1,flex:1,background:'#f1f5f9',marginTop:3}}></div>}
                            </div>
                            <div style={{paddingBottom:2,flex:1,minWidth:0}}>
                              <div style={{fontSize:12,fontWeight:600,color:'#334155'}}>{h.action}</div>
                              <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{h.user} · {new Date(h.timestamp).toLocaleDateString()} {new Date(h.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ── ANALYTICS ────────────────────────────────────────────────── */}
          {currentView==='analytics'&&(()=>{
            const active=activeRecords.filter(s=>s.internalStatus!=='Sent Out');
            const overdue=active.filter(s=>slaState(s).isLate);
            const avgAge=active.length>0?Math.round(active.reduce((a,s)=>a+slaState(s).de,0)/active.length):0;
            const pct=active.length>0?Math.round(overdue.length/active.length*100):0;
            const wMap={};active.forEach(s=>{const a=s.assignedTo||'Unassigned';wMap[a]=(wMap[a]||0)+1;});
            const workload=Object.entries(wMap).map(([n,c])=>({name:n,count:c})).sort((a,b)=>b.count-a.count);
            const bicMap={};active.forEach(s=>{const b=s.ballInCourt||'—';bicMap[b]=(bicMap[b]||0)+1;});
            const kpis=[{label:'Total Active',val:active.length,sub:'excluding Sent Out'},{label:'Overdue',val:overdue.length,sub:'past SLA deadline',alert:overdue.length>0},{label:'Avg Age (Days)',val:avgAge,sub:'across active items'},{label:'SLA Breach Rate',val:`${pct}%`,sub:'of total active'}];
            return(
              <div style={{display:'flex',flexDirection:'column',gap:20}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
                  {kpis.map(k=>(
                    <div key={k.label} className="card" style={{padding:'16px 18px',borderLeft:`3px solid ${k.alert?'#ef4444':'#e2e8f0'}`}}>
                      <div style={{fontSize:11,fontWeight:700,color:'#64748b',letterSpacing:'.05em',textTransform:'uppercase',marginBottom:8}}>{k.label}</div>
                      <div style={{fontSize:28,fontWeight:800,color:k.alert?'#dc2626':'#0f172a',letterSpacing:'-.02em'}}>{k.val}</div>
                      <div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>{k.sub}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                  <div className="card" style={{overflow:'hidden'}}>
                    <div style={{padding:'10px 16px',borderBottom:'1px solid #f1f5f9',fontSize:12,fontWeight:700,color:'#0f172a'}}>Engineer Workload</div>
                    <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:12}}>
                      {workload.length===0?<p style={{fontSize:12,color:'#94a3b8',fontStyle:'italic'}}>No assignments.</p>:workload.map(u=>{const max=Math.max(...workload.map(w=>w.count),1);return(<div key={u.name}><div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}><span style={{fontWeight:500,color:'#334155'}}>{u.name}</span><span style={{fontWeight:700,color:'#0f172a'}}>{u.count}</span></div><div style={{background:'#f1f5f9',borderRadius:3,height:6}}><div style={{background:'#2563eb',height:6,borderRadius:3,width:`${u.count/max*100}%`,transition:'width .4s'}}></div></div></div>);})}
                    </div>
                  </div>
                  <div className="card" style={{overflow:'hidden'}}>
                    <div style={{padding:'10px 16px',borderBottom:'1px solid #f1f5f9',fontSize:12,fontWeight:700,color:'#0f172a'}}>Ball-in-Court Distribution</div>
                    <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:12}}>
                      {Object.entries(bicMap).length===0?<p style={{fontSize:12,color:'#94a3b8',fontStyle:'italic'}}>No data.</p>:Object.entries(bicMap).sort((a,b)=>b[1]-a[1]).map(([bic,count])=>{const max=Math.max(...Object.values(bicMap),1);return(<div key={bic}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12,marginBottom:4}}><span className={`badge ${BIC_CLS[bic]||BIC_CLS['—']}`}>{bic}</span><span style={{fontWeight:700,color:'#0f172a'}}>{count}</span></div><div style={{background:'#f1f5f9',borderRadius:3,height:6}}><div style={{background:'#64748b',height:6,borderRadius:3,width:`${count/max*100}%`,transition:'width .4s'}}></div></div></div>);})}
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

        </div>
      </div>

      {/* Quick comment modal */}
      {quickModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:20}}>
          <div className="card" style={{width:'100%',maxWidth:420,overflow:'hidden'}}>
            <div style={{padding:'12px 16px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}><IMsg s={14} c="text-blue-500"/><span style={{fontWeight:700,fontSize:13,color:'#0f172a'}}>Quick Comment</span></div>
              <button onClick={()=>setQuickModal(null)} style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8'}}><IX s={15}/></button>
            </div>
            <div style={{padding:16}}>
              <div style={{background:'#f8fafc',borderRadius:5,padding:'8px 10px',marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:600,color:'#334155'}}>{quickModal.title}</div>
                <div style={{fontSize:11,color:'#94a3b8',marginTop:2,fontFamily:'monospace'}}>{quickModal.id} · {termRev} {quickModal.revision}</div>
              </div>
              <form onSubmit={addQuickComment} style={{display:'flex',flexDirection:'column',gap:10}}>
                <textarea autoFocus className="inp" rows="4" placeholder="Type your note…" value={quickText} onChange={e=>setQuickText(e.target.value)} style={{resize:'none',fontSize:13}}></textarea>
                <div style={{display:'flex',justifyContent:'flex-end',gap:8}}><button type="button" className="btn-secondary" style={{fontSize:12}} onClick={()=>setQuickModal(null)}>Cancel</button><button type="submit" disabled={!quickText.trim()} className="btn-primary" style={{fontSize:12}}>Save Note</button></div>
              </form>
            </div>
          </div>
        </div>
      )}

      <Toast toast={toast} onDismiss={()=>setToast(null)}/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
